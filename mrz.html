<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner MRZ — Praxis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #fff;
      margin: 0;
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: flex;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .field-row:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .field-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #94a3b8;
      min-width: 5.5rem;
    }

    .field-value {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      flex: 1;
      word-break: break-all;
    }

    .valid-badge {
      background: #22c55e22;
      color: #22c55e;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .invalid-badge {
      background: #ef444422;
      color: #ef4444;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .warn-badge {
      background: #f59e0b22;
      color: #f59e0b;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .copy-toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #000;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.8rem;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .copy-toast.show {
      opacity: 1;
    }

    .progress-ring {
      width: 120px;
      height: 120px;
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
  </style>
</head>

<body>
  <!-- TOAST COPIE -->
  <div id="copy-toast" class="copy-toast">✅ Copié !</div>

  <!-- 1. CHARGEMENT -->
  <div id="view-loading"
    class="view active fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-6">🛂</div>
    <h1 class="text-xl font-bold mb-2">Scanner MRZ</h1>
    <p class="text-slate-500 text-sm mb-6 text-center">Chargement du moteur OCR + parser ICAO...</p>
    <div class="w-full max-w-xs bg-slate-800 rounded-full h-2 overflow-hidden">
      <div id="load-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="load-status" class="text-slate-600 text-xs mt-3 font-mono">Initialisation...</p>
  </div>

  <!-- 2. PRÊT -->
  <div id="view-ready" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🛂</div>
      <h1 class="text-2xl font-bold mb-2">Scanner MRZ</h1>
      <p class="text-slate-400 text-sm">Passeport · CNI · Permis · Titre de séjour</p>
      <p class="text-slate-600 text-xs mt-1">Double lecture + synthèse croisée</p>
    </div>
    <button onclick="startCamera()"
      class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all">
      📷 Scanner avec la caméra
    </button>
    <label
      class="w-full max-w-sm mt-3 bg-white/10 hover:bg-white/15 py-4 rounded-xl font-bold text-lg transition-all text-center cursor-pointer block">
      📁 Importer une photo
      <input type="file" id="fileUpload" accept="image/*" class="hidden" />
    </label>
    <a href="1.html" class="mt-6 text-slate-500 hover:text-slate-300 text-sm flex items-center gap-1 transition-colors">
      ← Retour
    </a>
  </div>

  <!-- 3. SCANNER CAMÉRA -->
  <div id="view-scanning" class="view fixed inset-0 z-50 bg-black flex flex-col">
    <video id="video-stream" class="w-full h-full object-cover" playsinline muted></video>
    <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-end pb-44">
      <div class="w-[92%] max-w-[520px] h-[90px] border-2 border-dashed border-blue-400 rounded-lg relative">
        <div class="absolute inset-0 bg-blue-400/5 animate-pulse rounded-lg"></div>
        <div
          class="absolute -top-7 left-0 w-full text-center text-blue-400 font-bold text-[10px] tracking-widest uppercase">
          Bande MRZ
        </div>
      </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full px-4 pb-4 space-y-2">
      <div class="bg-black/85 backdrop-blur-xl p-3 rounded-2xl border border-slate-800">
        <div class="flex items-center gap-3 mb-2">
          <div class="flex gap-1" id="scan-dots">
            <span class="w-3 h-3 rounded-full bg-slate-700" id="dot-1"></span>
            <span class="w-3 h-3 rounded-full bg-slate-700" id="dot-2"></span>
            <span class="w-3 h-3 rounded-full bg-slate-700" id="dot-3"></span>
            <span class="w-3 h-3 rounded-full bg-slate-700" id="dot-4"></span>
          </div>
          <p id="scan-feedback" class="text-xs font-medium text-slate-300 flex-1">Démarrage...</p>
        </div>
        <p id="scan-debug" class="text-[9px] font-mono text-slate-700 truncate"></p>
        <div class="flex gap-2 mt-2">
          <button onclick="cancelScan()"
            class="flex-1 bg-white/10 py-2.5 rounded-xl font-bold border border-white/10 text-xs">Annuler</button>
          <button onclick="manualCapture()" class="flex-1 bg-blue-600 py-2.5 rounded-xl font-bold text-xs">📸
            Capturer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. PROCESSING -->
  <div id="view-processing" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-4 animate-spin">⏳</div>
    <p id="proc-status" class="text-slate-400 text-sm">Analyse en cours...</p>
  </div>

  <!-- 5. RÉSULTAT -->
  <div id="view-result" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col overflow-y-auto">
    <div class="px-6 py-6 flex-1">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Résultat</h2>
        <span id="res-valid-badge" class="valid-badge">—</span>
      </div>
      <div id="res-format" class="text-xs text-slate-500 font-mono mb-3">—</div>
      <div id="res-fields" class="space-y-2 mb-4"></div>

      <!-- BOUTON COPIER TOUT -->
      <button onclick="copyAllFields()"
        class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-sm mb-4 transition-all">
        📋 Copier tous les champs
      </button>

      <details class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
        <summary class="text-xs text-slate-500 cursor-pointer">Données brutes OCR + debug</summary>
        <pre id="res-raw" class="text-[10px] font-mono text-slate-500 mt-3 whitespace-pre-wrap break-all"></pre>
      </details>
    </div>
    <div class="px-6 pb-6">
      <button onclick="resetApp()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Nouveau scan</button>
    </div>
  </div>

  <canvas id="canvas-mrz" class="hidden"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    // =========================================================================
    // MRZ SCANNER v6 — DOUBLE LECTURE + SYNTHÈSE CROISÉE
    // Cycle : MRZ→Visible→MRZ→Visible → Synthèse → Cross-validation
    // =========================================================================

    let ocrWorker = null;
    let mrzParse = null;
    let inferenceTimeout = null;
    let isRecognizing = false;

    // Accumulateur pour les 2 cycles de lecture
    let scanCycles = [];
    let currentCycle = 0;
    const TOTAL_CYCLES = 2; // 2 lectures complètes

    // Résultat final pour copie
    let finalFields = {};

    const views = {};
    let video, canvas, scanFeedback;

    function init() {
      ['loading', 'ready', 'scanning', 'processing', 'result'].forEach(n => {
        views[n] = document.getElementById('view-' + n);
      });
      video = document.getElementById('video-stream');
      canvas = document.getElementById('canvas-mrz');
      scanFeedback = document.getElementById('scan-feedback');
      document.getElementById('fileUpload').addEventListener('change', handleFileUpload);
      loadEngine();
    }

    function switchView(name) {
      Object.values(views).forEach(v => { v.classList.remove('active'); v.classList.add('hidden'); });
      views[name].classList.add('active');
      views[name].classList.remove('hidden');
    }

    function resetAccumulator() {
      scanCycles = [];
      currentCycle = 0;
      finalFields = {};
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById('dot-' + i);
        if (dot) dot.className = 'w-3 h-3 rounded-full bg-slate-700';
      }
    }

    function updateDot(index, color) {
      const dot = document.getElementById('dot-' + index);
      if (dot) dot.className = 'w-3 h-3 rounded-full ' + color;
    }

    // =====================================================================
    // 1. CHARGEMENT
    // =====================================================================
    async function loadEngine() {
      const status = document.getElementById('load-status');
      const bar = document.getElementById('load-progress');
      const log = (t) => { status.innerText = t; console.log('[MRZ]', t); };

      try {
        log('Chargement parser ICAO...');
        bar.style.width = '10%';

        const cdns = ['https://esm.sh/mrz@5', 'https://esm.run/mrz@5'];
        for (const cdn of cdns) {
          try {
            const mod = await import(cdn);
            mrzParse = mod.parse;
            console.log('✅ mrz@5 chargé via ' + cdn);
            break;
          } catch (e) { console.warn('CDN échoué:', cdn, e.message); }
        }

        bar.style.width = '25%';
        log('Chargement moteur OCR...');

        ocrWorker = await Tesseract.createWorker('eng', 1, {
          logger: (m) => {
            if (m.progress !== undefined) bar.style.width = (25 + Math.round(m.progress * 65)) + '%';
            if (m.status) log(m.status);
          }
        });

        await ocrWorker.setParameters({
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<',
          tessedit_pageseg_mode: '6',
        });

        bar.style.width = '100%';
        log('Prêt !');
        setTimeout(() => switchView('ready'), 400);
      } catch (err) {
        log('ERREUR: ' + err.message);
      }
    }

    // =====================================================================
    // 2. CORRECTION OCR
    // =====================================================================
    const L2D = { 'O': '0', 'Q': '0', 'D': '0', 'U': '0', 'I': '1', 'L': '1', 'J': '1', 'Z': '2', 'A': '4', 'S': '5', 'G': '6', 'C': '6', 'T': '7', 'B': '8', 'P': '9' };
    const D2L = { '0': 'O', '1': 'I', '2': 'Z', '4': 'A', '5': 'S', '6': 'G', '8': 'B', '9': 'P' };

    function sanitizeLine(raw) {
      return raw.toUpperCase().replace(/[\s]+/g, '<').replace(/[.,;:_\-|!`'"~^°\[\](){}]+/g, '<').replace(/[^A-Z0-9<]/g, '').replace(/^<+/, '').trim();
    }

    function correctByMask(line, mask) {
      let out = '';
      for (let i = 0; i < line.length && i < mask.length; i++) {
        const c = line[i], m = mask[i];
        if (m === 'D') out += /[0-9]/.test(c) ? c : (L2D[c] || c);
        else if (m === 'A') out += /[A-Z<]/.test(c) ? c : (D2L[c] || c);
        else out += c;
      }
      return out;
    }

    const MASK_TD3_L2 = 'XXXXXXXXXDAAADDDDDDDXDDDDDDXXXXXXXXXXXXXXXD';
    const MASK_TD1_L1 = 'AAAAAXXXXXXXXDXXXXXXXXXXXXXXXX';
    const MASK_TD1_L2 = 'DDDDDDDXDDDDDDDAAAXXXXXXXXXXX';
    const MASK_PERMIS = 'AAAAAXXXXXXXXDDDDDDDXXXXXXXX';

    function normalizeTo(line, len) {
      if (line.length === len) return line;
      if (line.length > len) return line.substring(0, len);
      return line + '<'.repeat(len - line.length);
    }

    // =====================================================================
    // 3. EXTRACTION + SCORING MRZ
    // =====================================================================
    function scoreLine(line) {
      if (line.length < 25) return 0;
      let s = 0;
      const len = line.length;
      if (len === 44) s += 40; else if (len === 30) s += 40; else if (len === 36) s += 40;
      else if (len >= 28 && len <= 46) s += 15; else return 0;
      const ch = (line.match(/</g) || []).length;
      if (ch >= 2) s += 10; if (ch >= 5) s += 10;
      if (line.includes('<<')) s += 20;
      if (/^P[<0O]/.test(line)) s += 15;
      if (/^I[D0][A-Z<]/.test(line)) s += 15;
      if (/^D[1I][<]?F/.test(line)) s += 15;
      if (/^V[<A-Z]/.test(line)) s += 10;
      if (line.substring(2, 5).replace(/</g, '') === 'FRA') s += 10;
      if (ch > line.length * 0.8) s -= 20;
      return Math.max(0, s);
    }

    function extractCandidateLines(rawText) {
      return rawText.split(/\n/).map(r => {
        const clean = sanitizeLine(r);
        if (clean.length < 25) return null;
        const score = scoreLine(clean);
        return score >= 20 ? { line: clean, score, len: clean.length } : null;
      }).filter(Boolean).sort((a, b) => b.score - a.score);
    }

    function groupByFormat(candidates) {
      const groups = [];
      const td3 = candidates.filter(c => c.len >= 42 && c.len <= 46);
      if (td3.length >= 2) {
        const l1c = td3.filter(c => /^P/.test(c.line) || c.line.includes('<<'));
        if (l1c.length >= 1) {
          const l1 = l1c[0].line;
          const l2 = td3.find(c => c.line !== l1)?.line || td3[1].line;
          groups.push({ format: 'TD3', lines: [normalizeTo(l1, 44), normalizeTo(l2, 44)], score: td3[0].score + (td3[1]?.score || 0) });
        }
      }
      const td1 = candidates.filter(c => c.len >= 28 && c.len <= 32);
      if (td1.length >= 3) groups.push({ format: 'TD1', lines: td1.slice(0, 3).map(c => normalizeTo(c.line, 30)), score: td1.slice(0, 3).reduce((s, c) => s + c.score, 0) });
      if (td1.length === 2) groups.push({ format: 'TD1', lines: [...td1.map(c => normalizeTo(c.line, 30)), '<'.repeat(30)], score: td1.reduce((s, c) => s + c.score, 0) - 10 });
      const td2 = candidates.filter(c => c.len >= 34 && c.len <= 38);
      if (td2.length >= 2) groups.push({ format: 'TD2', lines: td2.slice(0, 2).map(c => normalizeTo(c.line, 36)), score: td2.slice(0, 2).reduce((s, c) => s + c.score, 0) });
      const permis = candidates.filter(c => c.len >= 28 && c.len <= 32 && /^D[1I]/.test(c.line));
      if (permis.length >= 1) groups.push({ format: 'PERMIS_FR', lines: [normalizeTo(permis[0].line, 30)], score: permis[0].score + 10 });
      groups.sort((a, b) => b.score - a.score);
      return groups;
    }

    // =====================================================================
    // 4. PARSING
    // =====================================================================
    function tryMrzParse(lines) {
      if (!mrzParse) return null;
      try { return mrzParse(lines); } catch (e) { return null; }
    }

    function parsePermisFrManual(line) {
      if (line.length < 26) return null;
      const norm = normalizeTo(line, 30);
      const prefix = norm.substring(0, 2).replace('DI', 'D1');
      const country = norm.substring(2, 5).replace(/</g, '');
      if (prefix !== 'D1' || country !== 'FRA') return null;
      const docNum = norm.substring(5, 14).replace(/</g, '');
      const rawExp = norm.substring(15, 21);
      let expiry = '';
      for (let i = 0; i < 6; i++) expiry += /[0-9]/.test(rawExp[i]) ? rawExp[i] : (L2D[rawExp[i]] || '0');
      return {
        valid: docNum.length >= 5, format: 'FRENCH_DRIVING_LICENSE', documentNumber: docNum,
        fields: { documentType: 'D1', issuingState: 'FRA', documentNumber: docNum, expirationDate: expiry },
        details: [], _manual: true,
      };
    }

    function parseMrzFromText(rawText) {
      const candidates = extractCandidateLines(rawText);
      if (candidates.length === 0) return null;
      const groups = groupByFormat(candidates);
      for (const g of groups) {
        let r = tryMrzParse(g.lines);
        if (r) return r;
        // Correction OCR
        const corrected = [...g.lines];
        if (g.format === 'TD3' && corrected.length >= 2) corrected[1] = correctByMask(corrected[1], MASK_TD3_L2);
        else if (g.format === 'TD1' && corrected.length >= 2) { corrected[0] = correctByMask(corrected[0], MASK_TD1_L1); corrected[1] = correctByMask(corrected[1], MASK_TD1_L2); }
        else if (g.format === 'PERMIS_FR') corrected[0] = correctByMask(corrected[0], MASK_PERMIS);
        r = tryMrzParse(corrected);
        if (r) return r;
        if (g.format === 'PERMIS_FR') { r = parsePermisFrManual(g.lines[0]); if (r) return r; }
      }
      return null;
    }

    // =====================================================================
    // 5. EXTRACTION CHAMPS VISIBLES
    // =====================================================================
    function extractVisibleDates(text) {
      const pattern = /(\d{2})[.\/\-](\d{2})[.\/\-](\d{4})/g;
      const dates = [];
      let m;
      while ((m = pattern.exec(text)) !== null) {
        const dd = m[1], mm = m[2], yyyy = m[3];
        if (parseInt(mm) >= 1 && parseInt(mm) <= 12 && parseInt(dd) >= 1 && parseInt(dd) <= 31 && parseInt(yyyy) >= 1900 && parseInt(yyyy) <= 2100) {
          dates.push({ formatted: dd + '.' + mm + '.' + yyyy, index: m.index, year: parseInt(yyyy) });
        }
      }
      return dates;
    }

    function assignDates(text, dates) {
      const r = { birthDate: null, issueDate: null, expiryDate: null };
      if (!dates.length) return r;
      for (const d of dates) {
        const before = text.substring(Math.max(0, d.index - 30), d.index).toUpperCase();
        if (/(?:^|\s)3\.?\s*$/.test(before) || /NAISSANCE/.test(before) || /DATE\s*DE\s*N/i.test(before)) r.birthDate = d.formatted;
        else if (/4\s*[Aa][.\s]*$/.test(before) || /DELIVR/i.test(before) || /EMISSION/i.test(before)) r.issueDate = d.formatted;
        else if (/4\s*[Bb][.\s]*$/.test(before) || /VALID/i.test(before) || /EXPIR/i.test(before) || /PEREMPTION/i.test(before)) r.expiryDate = d.formatted;
      }
      // Fallback chronologique
      if (!r.birthDate || !r.issueDate || !r.expiryDate) {
        const sorted = [...dates].sort((a, b) => a.year - b.year);
        if (!r.birthDate && sorted.length >= 1) r.birthDate = sorted[0].formatted;
        if (!r.expiryDate && sorted.length >= 2) r.expiryDate = sorted[sorted.length - 1].formatted;
        if (!r.issueDate && sorted.length >= 3) r.issueDate = sorted[Math.floor(sorted.length / 2)].formatted;
      }
      return r;
    }

    /**
     * Nettoie les caractères de logo/nuisances (souvent devant ou derrière les noms sur permis FR).
     * Si le nom contient un 'A' ou 'S' isolé ou doublé au début/fin à cause du logo, on le retire.
     */
    function stripLogoNoise(name, mrzName) {
      if (!name || name.length < 1) return name;
      let res = name.trim().toUpperCase();
      const m = mrzName ? mrzName.replace(/</g, '').trim().toUpperCase() : null;

      // --- DÉBUT : logo + première lettre du nom ---
      // Si "AA" au début -> "A" (logo A + nom commençant par A)
      if (res.startsWith('AA')) res = res.substring(1);
      else if (res.startsWith('SS')) res = res.substring(1);
      else if (res.startsWith('A') || res.startsWith('S')) {
        // Si on a un MRZ et que le nom MRZ ne commence pas par cette lettre -> logo parasite
        if (m) { if (!m.startsWith(res[0])) res = res.substring(1); }
        // Sinon si c'est suivi d'un séparateur -> logo parasite
        else if (/^[AS][\s.]+/.test(res)) res = res.replace(/^[AS][\s.]+/, '').trim();
      }

      // --- FIN : logo + dernière lettre du nom ---
      if (res.endsWith('AA')) res = res.slice(0, -1);
      else if (res.endsWith('SS')) res = res.slice(0, -1);
      else if (res.endsWith('A') || res.endsWith('S')) {
        const last = res[res.length - 1];
        if (m) { if (!m.endsWith(last)) res = res.slice(0, -1); }
        else if (/[\s.]+[AS]$/.test(res)) res = res.replace(/[\s.]+[AS]$/, '').trim();
      }

      return res.trim();
    }

    /**
     * Extrait nom et prénom depuis le texte visible du document.
     * Cherche les labels numérotés (1. NOM, 2. PRENOM) typiques du permis FR
     * et aussi les labels textuels (NOM:, PRENOM:, Surname, Given names)
     */
    function extractNameFields(text) {
      const r = { lastName: null, firstName: null };
      const lines = text.split(/\n/).map(l => l.trim());
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const upper = line.toUpperCase();

        // --- NOM ---
        let m = upper.match(/^1[.\s:]+([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']{2,})/);
        if (m) { r.lastName = stripLogoNoise(m[1].trim()); continue; }
        if (/^1[.\s]*$/.test(upper) && i + 1 < lines.length) {
          const next = lines[i + 1].trim();
          if (next.length >= 2 && /^[A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']+$/i.test(next)) {
            r.lastName = stripLogoNoise(next.toUpperCase());
          }
        }
        m = upper.match(/(?:NOM|SURNAME|NOM\s*DE\s*FAMILLE)[\s:]+([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']{2,})/);
        if (m && !r.lastName) r.lastName = stripLogoNoise(m[1].trim());

        // --- PRÉNOM ---
        m = upper.match(/^2[.\s:]+([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']{2,})/);
        if (m) { r.firstName = stripLogoNoise(m[1].trim()); continue; }
        if (/^2[.\s]*$/.test(upper) && i + 1 < lines.length) {
          const next = lines[i + 1].trim();
          if (next.length >= 2 && /^[A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']+$/i.test(next)) {
            r.firstName = stripLogoNoise(next.toUpperCase());
          }
        }
        m = upper.match(/(?:PRENOM|PR[ÉE]NOM|GIVEN|FIRST\s*NAME)[\s:]+([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']{2,})/);
        if (m && !r.firstName) r.firstName = stripLogoNoise(m[1].trim());
      }
      return r;
    }

    function extractVisibleFields(fullText) {
      const dates = extractVisibleDates(fullText);
      const assigned = assignDates(fullText, dates);
      const names = extractNameFields(fullText);
      const upper = fullText.toUpperCase();
      let docType = null;
      if (upper.includes('PERMIS') && upper.includes('CONDUIRE')) docType = 'PERMIS_FR';
      else if (upper.includes('PASSEPORT') || upper.includes('PASSPORT')) docType = 'PASSEPORT';
      else if (upper.includes('CARTE') && upper.includes('IDENTIT')) docType = 'CNI';
      else if (upper.includes('TITRE') && upper.includes('SEJOUR')) docType = 'TITRE_SEJOUR';
      return { docType, ...names, ...assigned, datesFound: dates.length };
    }

    // =====================================================================
    // 6. CROSS-VALIDATION + SYNTHÈSE
    // =====================================================================

    /**
     * Cross-valide le nom MRZ vs nom visible.
     * Si MRZ= "DUPONT", visible doit contenir "DUPONT".
     * Si visible= "SMHXS" et MRZ= "MHX" → incohérent (MRZ est substring mais visible a du bruit).
     */
    function crossValidateName(mrzName, visibleName) {
      if (!mrzName || !visibleName) return visibleName || mrzName;
      const mrz = mrzName.replace(/</g, ' ').trim().toUpperCase();
      const vis = stripLogoNoise(visibleName, mrz);

      // Si identiques → parfait
      if (mrz === vis) return vis;

      // Si le MRZ est contenu dans le visible
      if (vis.includes(mrz)) {
        if (vis.length <= mrz.length + 2) return vis;
        return mrz;
      }

      // Si le visible est contenu dans le MRZ → le MRZ est plus complet
      if (mrz.includes(vis)) return mrz;

      // Calculer la similarité
      const similarity = stringSimilarity(mrz, vis);
      return similarity > 0.6 ? vis : mrz; // Préférer le visible si assez proche
    }

    /**
     * Similarité simple entre deux strings (0-1).
     */
    function stringSimilarity(a, b) {
      if (!a || !b) return 0;
      const longer = a.length > b.length ? a : b;
      const shorter = a.length > b.length ? b : a;
      if (longer.length === 0) return 1;
      let matches = 0;
      for (let i = 0; i < shorter.length; i++) {
        if (shorter[i] === longer[i]) matches++;
      }
      return matches / longer.length;
    }

    /**
     * Synthèse logique de 2 cycles de lecture.
     * Pour chaque champ : comparer les 2 lectures, prendre le plus fiable.
     */
    function synthesizeCycles(cycles) {
      if (cycles.length === 0) return null;
      if (cycles.length === 1) return cycles[0];

      const c1 = cycles[0];
      const c2 = cycles[1];
      const result = {
        format: c1.format || c2.format,
        documentNumber: voteField(c1.documentNumber, c2.documentNumber),
        fields: {},
        valid: c1.valid || c2.valid,
        details: c1.details || c2.details || [],
        _strategy: 'Synthèse 2 cycles',
      };

      // Pour chaque champ, voter
      const allKeys = new Set([...Object.keys(c1.fields || {}), ...Object.keys(c2.fields || {})]);
      for (const key of allKeys) {
        const v1 = c1.fields?.[key];
        const v2 = c2.fields?.[key];

        if (key === 'lastName' || key === 'firstName') {
          // Cross-validation nom : utiliser la logique MRZ vs visible
          const mrzVal = c1._mrzFields?.[key] || c2._mrzFields?.[key];
          const visVal = v1 || v2;
          result.fields[key] = crossValidateName(mrzVal, visVal);
        } else {
          result.fields[key] = voteField(v1, v2);
        }
      }

      // Cross-valider le document number
      if (c1.documentNumber && c2.documentNumber) {
        result.documentNumber = c1.documentNumber === c2.documentNumber
          ? c1.documentNumber
          : (c1.valid ? c1.documentNumber : c2.documentNumber);
      }

      return result;
    }

    /**
     * Vote entre 2 valeurs de champ.
     */
    function voteField(v1, v2) {
      if (!v1 && !v2) return null;
      if (!v1) return v2;
      if (!v2) return v1;
      if (v1 === v2) return v1; // Consensus parfait
      // Si c'est une date, préférer le format DD.MM.YYYY
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(v1)) return v1;
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(v2)) return v2;
      return v1.length >= v2.length ? v1 : v2; // Préférer la plus longue
    }

    // =====================================================================
    // 7. UN CYCLE COMPLET (MRZ + Visible)
    // =====================================================================

    /**
     * Exécute un cycle complet de lecture :
     * 1. Lecture plein cadre (texte visible → noms, dates)
     * 2. Lecture bande MRZ (MRZ → docNumber, etc.)
     * 3. Fusion MRZ + visible
     * Retourne l'objet résultat du cycle.
     */
    async function runOneCycle(source) {
      // source = 'camera' ou un objet Image pour upload

      let fullText = '';
      let mrzText = '';

      if (source === 'camera') {
        const srcW = video.videoWidth;
        const srcH = video.videoHeight;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // PASS 1 : Plein cadre
        canvas.width = srcW; canvas.height = srcH;
        ctx.filter = 'contrast(1.8) grayscale(1)';
        ctx.drawImage(video, 0, 0);
        ctx.filter = 'none';

        await ocrWorker.setParameters({ tessedit_char_whitelist: '', tessedit_pageseg_mode: '3' });
        const { data: fd } = await ocrWorker.recognize(canvas.toDataURL('image/jpeg', 0.85));
        fullText = fd.text;

        // PASS 2 : Bande MRZ
        const cropH = Math.round(srcH * 0.35);
        const cropY = srcH - cropH;
        canvas.width = srcW; canvas.height = cropH;
        ctx.filter = 'contrast(2.5) grayscale(1)';
        ctx.drawImage(video, 0, cropY, srcW, cropH, 0, 0, srcW, cropH);
        ctx.filter = 'none';
        binarize(ctx, srcW, cropH);

        await ocrWorker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<', tessedit_pageseg_mode: '6' });
        const { data: md } = await ocrWorker.recognize(canvas.toDataURL('image/png'));
        mrzText = md.text;

      } else {
        // source = Image object
        const img = source;
        const ctx = canvas.getContext('2d');

        // PASS 1 : Plein cadre
        canvas.width = img.width; canvas.height = img.height;
        ctx.filter = 'contrast(1.8) grayscale(1)';
        ctx.drawImage(img, 0, 0);
        ctx.filter = 'none';

        await ocrWorker.setParameters({ tessedit_char_whitelist: '', tessedit_pageseg_mode: '3' });
        const { data: fd } = await ocrWorker.recognize(canvas.toDataURL('image/jpeg', 0.85));
        fullText = fd.text;

        // PASS 2 : Bande MRZ
        const cropH = Math.round(img.height * 0.35);
        const cropY = img.height - cropH;
        canvas.width = img.width; canvas.height = cropH;
        ctx.filter = 'contrast(2.5) grayscale(1)';
        ctx.drawImage(img, 0, cropY, img.width, cropH, 0, 0, img.width, cropH);
        ctx.filter = 'none';
        binarize(ctx, img.width, cropH);

        await ocrWorker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<', tessedit_pageseg_mode: '6' });
        const { data: md } = await ocrWorker.recognize(canvas.toDataURL('image/png'));
        mrzText = md.text;
      }

      console.log('[Cycle] Visible:', fullText.substring(0, 150));
      console.log('[Cycle] MRZ:', mrzText.substring(0, 150));

      // Parser la MRZ
      const mrzResult = parseMrzFromText(mrzText);

      // Extraire les champs visibles
      const visible = extractVisibleFields(fullText);

      // Fusionner
      const merged = {
        format: mrzResult?.format || visible.docType || 'UNKNOWN',
        documentNumber: mrzResult?.documentNumber || null,
        valid: mrzResult?.valid || false,
        fields: {},
        details: mrzResult?.details || [],
        _mrzFields: {}, // Garder les champs MRZ bruts pour cross-validation
        _rawText: fullText,
        _mrzRaw: mrzText,
      };

      // Champs MRZ
      if (mrzResult?.fields) {
        for (const [k, v] of Object.entries(mrzResult.fields)) {
          if (v) {
            merged.fields[k] = v;
            merged._mrzFields[k] = v;
          }
        }
      }

      // Combler avec les champs visibles
      if (visible.lastName && !merged.fields.lastName) merged.fields.lastName = visible.lastName;
      if (visible.firstName && !merged.fields.firstName) merged.fields.firstName = visible.firstName;
      if (visible.birthDate && !merged.fields.birthDate) merged.fields.birthDate = visible.birthDate;
      if (visible.issueDate) merged.fields.issueDate = visible.issueDate; // Jamais dans MRZ
      if (visible.expiryDate && !merged.fields.expirationDate) merged.fields.expirationDate = visible.expiryDate;

      return merged;
    }

    // =====================================================================
    // 8. CAMÉRA + BOUCLE
    // =====================================================================
    async function startCamera() {
      switchView('scanning');
      scanFeedback.innerText = 'Démarrage caméra...';
      isRecognizing = false;
      resetAccumulator();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = stream;
        await video.play();
        scanFeedback.innerText = 'Cadrez le document...';
        inferenceLoop();
      } catch (err) {
        scanFeedback.innerText = 'Erreur caméra: ' + err.message;
      }
    }

    function stopCamera() {
      if (inferenceTimeout) { clearTimeout(inferenceTimeout); inferenceTimeout = null; }
      if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    }
    function cancelScan() { stopCamera(); switchView('ready'); }
    function resetApp() { switchView('ready'); }

    async function inferenceLoop() {
      if (!video.srcObject || video.paused || video.ended) return;

      if (!isRecognizing && ocrWorker && currentCycle < TOTAL_CYCLES) {
        isRecognizing = true;
        try {
          const stepIdx = currentCycle * 2 + 1; // dot index : 1,2 pour cycle 1, 3,4 pour cycle 2
          updateDot(stepIdx, 'bg-yellow-400 animate-pulse');
          scanFeedback.innerText = `Lecture ${currentCycle + 1}/${TOTAL_CYCLES} — MRZ...`;

          const cycleResult = await runOneCycle('camera');

          // Vérifier si on a trouvé quelque chose d'utile
          const hasData = cycleResult.documentNumber || cycleResult.fields.lastName || cycleResult.fields.birthDate;

          if (hasData) {
            updateDot(stepIdx, 'bg-green-400');
            updateDot(stepIdx + 1, 'bg-green-400');
            scanCycles.push(cycleResult);
            currentCycle++;
            scanFeedback.innerText = `Lecture ${currentCycle}/${TOTAL_CYCLES} OK`;

            if (currentCycle >= TOTAL_CYCLES) {
              // 2 lectures terminées → synthèse
              scanFeedback.innerText = 'Synthèse croisée...';
              const synthesis = synthesizeCycles(scanCycles);
              showMrzResult(synthesis);
              return;
            } else {
              scanFeedback.innerText = `Lecture ${currentCycle + 1}/${TOTAL_CYCLES}...`;
            }
          } else {
            updateDot(stepIdx, 'bg-red-400');
            scanFeedback.innerText = 'Rien détecté. Recadrez...';
          }

          const debugEl = document.getElementById('scan-debug');
          if (debugEl) debugEl.innerText = cycleResult._mrzRaw.replace(/\n/g, '|').substring(0, 100);

        } catch (e) {
          console.error('[Cycle error]', e);
        } finally {
          isRecognizing = false;
        }
      }

      inferenceTimeout = setTimeout(inferenceLoop, 2000);
    }

    async function manualCapture() {
      if (!ocrWorker || !video.srcObject) return;
      if (inferenceTimeout) { clearTimeout(inferenceTimeout); inferenceTimeout = null; }
      isRecognizing = true;

      try {
        scanFeedback.innerText = 'Capture forcée...';

        // Lire 2 cycles d'un coup
        for (let i = currentCycle; i < TOTAL_CYCLES; i++) {
          const stepIdx = i * 2 + 1;
          updateDot(stepIdx, 'bg-yellow-400 animate-pulse');
          scanFeedback.innerText = `Lecture ${i + 1}/${TOTAL_CYCLES}...`;
          const result = await runOneCycle('camera');
          scanCycles.push(result);
          currentCycle++;
          const hasData = result.documentNumber || result.fields.lastName;
          updateDot(stepIdx, hasData ? 'bg-green-400' : 'bg-orange-400');
          updateDot(stepIdx + 1, hasData ? 'bg-green-400' : 'bg-orange-400');
        }

        const synthesis = synthesizeCycles(scanCycles);
        showMrzResult(synthesis);
      } catch (e) {
        console.error(e);
        scanFeedback.innerText = 'Erreur: ' + e.message;
      } finally {
        isRecognizing = false;
      }
    }

    // =====================================================================
    // 9. UPLOAD PHOTO
    // =====================================================================
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file || !ocrWorker) return;
      event.target.value = '';
      switchView('processing');
      resetAccumulator();

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = async () => {
          try {
            // 2 cycles sur la même image
            for (let i = 0; i < TOTAL_CYCLES; i++) {
              document.getElementById('proc-status').innerText = `Lecture ${i + 1}/${TOTAL_CYCLES}...`;
              const result = await runOneCycle(img);
              scanCycles.push(result);
            }
            const synthesis = synthesizeCycles(scanCycles);
            if (synthesis && (synthesis.documentNumber || synthesis.fields.lastName)) {
              showMrzResult(synthesis);
            } else {
              showRawResult(scanCycles[0]?._rawText || '', 'Aucune donnée extraite');
            }
          } catch (err) {
            console.error(err);
            showRawResult('', 'Erreur: ' + err.message);
          }
        };
        img.onerror = () => showRawResult('', 'Image illisible');
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // =====================================================================
    // 10. BINARISATION
    // =====================================================================
    function binarize(ctx, w, h) {
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) sum += d[i];
      const threshold = (sum / (d.length / 4)) * 0.65;
      for (let i = 0; i < d.length; i += 4) {
        const v = d[i] < threshold ? 0 : 255;
        d[i] = d[i + 1] = d[i + 2] = v;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // =====================================================================
    // 11. AFFICHAGE + COPIE
    // =====================================================================
    const LABELS = {
      documentType: ['📄', 'Type'],
      documentNumber: ['🔢', 'N° Document'],
      issuingState: ['🏳️', 'Pays'],
      lastName: ['👤', 'Nom'],
      firstName: ['👤', 'Prénom'],
      nationality: ['🌍', 'Nationalité'],
      birthDate: ['🎂', 'Naissance'],
      sex: ['⚧', 'Sexe'],
      expirationDate: ['📅', 'Expiration'],
      issueDate: ['📅', 'Émission'],
      personalNumber: ['🔑', 'N° Personnel'],
    };

    // Ordre d'affichage préféré
    const FIELD_ORDER = ['lastName', 'firstName', 'documentNumber', 'birthDate', 'issueDate', 'expirationDate', 'nationality', 'issuingState', 'sex', 'documentType', 'personalNumber'];

    function fmtDate(d) {
      if (!d || d.length !== 6) return d || '—';
      const yy = d.substring(0, 2), mm = d.substring(2, 4), dd = d.substring(4, 6);
      return dd + '.' + mm + '.' + (parseInt(yy) > 50 ? '19' : '20') + yy;
    }

    function showMrzResult(result) {
      stopCamera();
      if (!result) { showRawResult('', 'Aucun résultat'); return; }

      const badge = document.getElementById('res-valid-badge');
      if (result.valid) { badge.className = 'valid-badge'; badge.innerText = '✅ VALIDE'; }
      else if (result.format && result.format !== 'UNKNOWN') { badge.className = 'warn-badge'; badge.innerText = '⚠️ PARTIEL'; }
      else { badge.className = 'invalid-badge'; badge.innerText = '❌ ERREURS'; }

      document.getElementById('res-format').innerText =
        'Format: ' + (result.format || '?') + ' — ' + (result._strategy || '');

      const container = document.getElementById('res-fields');
      container.innerHTML = '';
      finalFields = {};

      // N° document en premier
      if (result.documentNumber) {
        finalFields['N° Document'] = result.documentNumber;
        addField(container, '🆔', 'N° Document', result.documentNumber, true);
      }

      // Champs dans l'ordre préféré
      if (result.fields) {
        for (const key of FIELD_ORDER) {
          let val = result.fields[key];
          if (val === undefined || val === null || val === '') continue;
          if (key === 'documentNumber' && result.documentNumber) continue;
          const [icon, label] = LABELS[key] || ['📋', key];
          if (key.toLowerCase().includes('date') && typeof val === 'string' && val.length === 6) val = fmtDate(val);
          finalFields[label] = val;
          addField(container, icon, label, val);
        }
        // Autres champs non ordonnés
        for (const [key, val] of Object.entries(result.fields)) {
          if (!FIELD_ORDER.includes(key) && val) {
            const [icon, label] = LABELS[key] || ['📋', key];
            if (!finalFields[label]) {
              finalFields[label] = val;
              addField(container, icon, label, val);
            }
          }
        }
      }

      // Infos de validation
      if (result.details) {
        const errs = result.details.filter(d => !d.valid && d.error);
        if (errs.length > 0) {
          const div = document.createElement('div');
          div.className = 'mt-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs text-red-400';
          div.innerHTML = '<b>Validation :</b><br>' + errs.map(e => '• ' + (e.label || e.field || '?') + ': ' + e.error).join('<br>');
          container.appendChild(div);
        }
      }

      // Debug
      const rawParts = scanCycles.map((c, i) => `--- Cycle ${i + 1} ---\nVisible: ${(c._rawText || '').substring(0, 200)}\nMRZ: ${(c._mrzRaw || '').substring(0, 100)}`);
      document.getElementById('res-raw').innerText = rawParts.join('\n\n');

      switchView('result');
    }

    function addField(container, icon, label, value, highlight) {
      const row = document.createElement('div');
      row.className = 'field-row';
      if (highlight) { row.style.background = 'rgba(59,130,246,0.1)'; row.style.border = '1px solid rgba(59,130,246,0.2)'; }
      row.innerHTML = '<span class="text-lg">' + icon + '</span><span class="field-label">' + label +
        '</span><span class="field-value"' + (highlight ? ' style="color:#60a5fa;font-family:monospace;"' : '') + '>' + value + '</span>';
      // Clic sur un champ → copier sa valeur
      row.addEventListener('click', () => {
        navigator.clipboard.writeText(value).then(() => showToast('✅ ' + label + ' copié !')).catch(() => { });
      });
      container.appendChild(row);
    }

    function showRawResult(rawText, msg) {
      stopCamera();
      document.getElementById('res-valid-badge').className = 'invalid-badge';
      document.getElementById('res-valid-badge').innerText = '❌ ÉCHEC';
      document.getElementById('res-format').innerText = msg;
      document.getElementById('res-fields').innerHTML = '<div class="field-row"><span class="field-value text-slate-500">Aucune donnée extraite</span></div>';
      document.getElementById('res-raw').innerText = rawText || '';
      finalFields = {};
      switchView('result');
    }

    // =====================================================================
    // 12. COPIER TOUT
    // =====================================================================
    function copyAllFields() {
      const lines = [];
      for (const [label, value] of Object.entries(finalFields)) {
        lines.push(label + ': ' + value);
      }
      const text = lines.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        showToast('✅ Tous les champs copiés !');
      }).catch(() => {
        // Fallback pour les navigateurs sans clipboard API
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✅ Tous les champs copiés !');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('copy-toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    // =====================================================================
    window.addEventListener('DOMContentLoaded', init);
  </script>

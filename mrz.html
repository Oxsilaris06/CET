<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner Identité Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #fff; margin: 0; min-height: 100vh; }
    .view { display: none; }
    .view.active { display: flex; }
    
    .field-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.04); border-radius: 0.75rem; margin-bottom: 0.5rem; cursor: pointer; transition: background 0.2s; }
    .field-row:active { background: rgba(255, 255, 255, 0.1); }
    .field-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; min-width: 5.5rem; }
    .field-value { font-size: 1rem; font-weight: 600; color: #f1f5f9; flex: 1; word-break: break-all; }
    
    .valid-badge { background: #22c55e22; color: #22c55e; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
    .invalid-badge { background: #ef444422; color: #ef4444; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
    .warn-badge { background: #f59e0b22; color: #f59e0b; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
    
    .copy-toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #22c55e; color: #000; padding: 0.5rem 1.5rem; border-radius: 2rem; font-weight: 700; font-size: 0.8rem; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .copy-toast.show { opacity: 1; }
    
    .doc-selector { display: flex; gap: 0.5rem; width: 100%; max-width: 24rem; margin-top: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .doc-btn { flex: 1; min-width: 80px; padding: 0.6rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; font-size: 0.65rem; font-weight: 600; color: #94a3b8; text-align: center; transition: all 0.2s; white-space: nowrap; }
    .doc-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59, 131, 246, 0.3); }

    .engine-badge { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; backdrop-filter: blur(4px); }
    .engine-native { color: #4ade80; border: 1px solid #4ade8055; }
    .engine-wasm { color: #facc15; border: 1px solid #facc1555; }
  </style>
</head>

<body>
  <div id="copy-toast" class="copy-toast">✅ Copié !</div>

  <!-- 1. CHARGEMENT -->
  <div id="view-loading" class="view active fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-6 animate-pulse">🛂</div>
    <h1 class="text-xl font-bold mb-2">Initialisation OCR</h1>
    <div class="w-full max-w-xs bg-slate-800 rounded-full h-2 mt-4 overflow-hidden">
      <div id="load-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="load-status" class="text-slate-500 text-xs mt-3 font-mono">Chargement...</p>
  </div>

  <!-- 2. PRÊT -->
  <div id="view-ready" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div id="engine-indicator" class="engine-badge engine-wasm">Moteur: Détection...</div>
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">📷</div>
      <h1 class="text-2xl font-bold mb-2">Scanner Identité</h1>
      <p class="text-slate-400 text-sm">Extraction structurée temps réel</p>
    </div>

    <div class="doc-selector mb-6" id="ready-selector">
      <button class="doc-btn active" data-type="AUTO">AUTO</button>
      <button class="doc-btn" data-type="PASSEPORT">🛂 PASS</button>
      <button class="doc-btn" data-type="PERMIS_FR">🚗 PERMIS</button>
      <button class="doc-btn" data-type="TITRE_SEJOUR">📜 SÉJOUR</button>
      <button class="doc-btn" data-type="CNI">🆔 CNI</button>
    </div>

    <button onclick="startCamera()" class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-600/20">
      Scanner un document
    </button>
    <label class="w-full max-w-sm mt-4 bg-white/5 hover:bg-white/10 py-4 rounded-xl font-bold text-lg transition-all text-center cursor-pointer block border border-white/10">
      Importer une photo
      <input type="file" id="fileUpload" accept="image/*" class="hidden" />
    </label>
  </div>

  <!-- 3. SCANNER CAMÉRA -->
  <div id="view-scanning" class="view fixed inset-0 z-50 bg-black flex flex-col">
    <video id="video-stream" class="w-full h-full object-cover" playsinline muted></video>
    
    <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
      <div class="w-[90%] max-w-[400px] aspect-[1.58/1] border-2 border-blue-500/50 rounded-xl relative overflow-hidden">
        <div class="absolute bottom-0 left-0 w-full h-[30%] bg-blue-500/20 border-t border-blue-500/50 flex items-center justify-center">
          <span class="text-blue-300/70 text-[10px] font-bold tracking-widest uppercase">Zone MRZ</span>
        </div>
      </div>
    </div>

    <div class="absolute bottom-8 left-0 w-full px-6">
      <div class="bg-black/80 backdrop-blur-md p-4 rounded-2xl border border-slate-800 text-center">
        <p id="scan-feedback" class="text-sm font-medium text-blue-400 mb-2 animate-pulse">Recherche de texte...</p>
        <p id="scan-debug" class="text-[10px] font-mono text-slate-500 truncate mb-4"></p>
        
        <div class="flex gap-2">
          <button onclick="cancelScan()" class="flex-1 bg-white/10 py-3 rounded-lg font-bold text-sm">Annuler</button>
          <button onclick="forceCapture()" class="flex-1 bg-blue-600 py-3 rounded-lg font-bold text-sm shadow-lg shadow-blue-600/30">📸 Capturer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. RÉSULTAT -->
  <div id="view-result" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col overflow-y-auto">
    <div class="px-6 py-6 flex-1">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Résultat</h2>
        <span id="res-valid-badge" class="valid-badge">—</span>
      </div>
      <div id="res-format" class="text-xs text-slate-500 font-mono mb-4">—</div>
      <div id="res-fields" class="space-y-2 mb-6"></div>

      <button onclick="copyAllFields()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-sm mb-4 transition-all">
        📋 Copier tous les champs
      </button>

      <details class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
        <summary class="text-xs text-slate-500 cursor-pointer">Données brutes OCR</summary>
        <pre id="res-raw" class="text-[10px] font-mono text-slate-500 mt-3 whitespace-pre-wrap break-all"></pre>
      </details>
    </div>
    <div class="px-6 pb-6">
      <button onclick="resetApp()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Nouveau scan</button>
    </div>
  </div>

  <canvas id="canvas-mrz" class="hidden"></canvas>

  <script>
    // =====================================================================
    // VARIABLES GLOBALES
    // =====================================================================
    const views = {};
    let video, canvas, ctx;
    let mrzParse = null;
    let scanTimeout = null;
    let ocrEngine = 'NONE'; 
    let tesseractWorker = null;
    let isScanning = false;
    let lastRawText = "";

    let selectedDocType = 'AUTO';
    let finalFields = {};

    const LABELS = {
      documentType: ['📄', 'Type de Document'], documentNumber: ['🆔', 'N° Document'],
      issuingState: ['🏳️', 'Pays'], lastName: ['👤', 'Nom'], firstName: ['👤', 'Prénom'],
      nationality: ['🌍', 'Nationalité'], birthDate: ['🎂', 'Date de Naissance'],
      sex: ['⚧', 'Sexe'], expirationDate: ['📅', 'Date d\'Expiration']
    };
    const FIELD_ORDER = ['documentType', 'documentNumber', 'lastName', 'firstName', 'birthDate', 'sex', 'nationality', 'expirationDate', 'issuingState'];

    const L2D = { 'O': '0', 'Q': '0', 'D': '0', 'U': '0', 'I': '1', 'L': '1', 'J': '1', 'Z': '2', 'A': '4', 'S': '5', 'G': '6', 'C': '6', 'T': '7', 'B': '8', 'P': '9' };
    const D2L = { '0': 'O', '1': 'I', '2': 'Z', '4': 'A', '5': 'S', '6': 'G', '8': 'B', '9': 'P' };

    // =====================================================================
    // INITIALISATION
    // =====================================================================
    window.addEventListener('DOMContentLoaded', async () => {
      ['loading', 'ready', 'scanning', 'result'].forEach(n => views[n] = document.getElementById('view-' + n));
      video = document.getElementById('video-stream');
      canvas = document.getElementById('canvas-mrz');
      ctx = canvas.getContext('2d', { willReadFrequently: true });
      document.getElementById('fileUpload').addEventListener('change', handleFileUpload);

      document.querySelectorAll('.doc-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedDocType = btn.getAttribute('data-type');
          document.querySelectorAll('.doc-btn').forEach(b => {
            if (b.getAttribute('data-type') === selectedDocType) b.classList.add('active');
            else b.classList.remove('active');
          });
        });
      });

      await loadEngines();
    });

    function switchView(name) {
      Object.values(views).forEach(v => { v.classList.remove('active'); v.classList.add('hidden'); });
      views[name].classList.add('active');
      views[name].classList.remove('hidden');
    }

    async function loadEngines() {
      const status = document.getElementById('load-status');
      const bar = document.getElementById('load-progress');
      
      try {
        status.innerText = "Chargement des règles ICAO...";
        bar.style.width = '30%';
        const mod = await import('https://esm.sh/mrz@5');
        mrzParse = mod.parse;

        if ('TextDetector' in window) {
          ocrEngine = 'NATIVE';
          status.innerText = "Moteur Natif activé 🚀";
          document.getElementById('engine-indicator').innerText = "⚡ Moteur Natif";
          document.getElementById('engine-indicator').className = "engine-badge engine-native";
          bar.style.width = '100%';
        } else {
          ocrEngine = 'TESSERACT';
          status.innerText = "Chargement Tesseract WASM...";
          document.getElementById('engine-indicator').innerText = "🐢 Moteur Web";
          document.getElementById('engine-indicator').className = "engine-badge engine-wasm";
          bar.style.width = '60%';
          
          tesseractWorker = await Tesseract.createWorker('eng');
          await tesseractWorker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<', });
          bar.style.width = '100%';
        }
        setTimeout(() => switchView('ready'), 500);
      } catch (err) {
        status.innerText = "Erreur: " + err.message;
      }
    }

    // =====================================================================
    // ALGORITHMES MRZ (Restaurés depuis ton code original)
    // =====================================================================
    function sanitizeLine(raw) {
      return raw.toUpperCase().replace(/[\s]+/g, '<').replace(/[.,;:_\-|!`'"~^°\[\](){}]+/g, '<').replace(/[^A-Z0-9<]/g, '').replace(/^<+/, '').trim();
    }

    function normalizeTo(line, len) {
      if (line.length === len) return line;
      if (line.length > len) return line.substring(0, len);
      return line + '<'.repeat(len - line.length);
    }

    function correctByMask(line, mask) {
      let out = '';
      for (let i = 0; i < line.length && i < mask.length; i++) {
        const c = line[i], m = mask[i];
        if (m === 'D') out += /[0-9]/.test(c) ? c : (L2D[c] || c);
        else if (m === 'A') out += /[A-Z<]/.test(c) ? c : (D2L[c] || c);
        else out += c;
      }
      return out;
    }

    function extractCandidateLines(rawText) {
      if (!rawText) return [];
      return rawText.split(/\n/).map(r => {
        const clean = sanitizeLine(r);
        if (clean.length < 25) return null;
        let score = clean.length; 
        if (clean.includes('<<')) score += 10;
        return { line: clean, score, len: clean.length };
      }).filter(Boolean).sort((a, b) => b.score - a.score);
    }

    function tryMrzParse(lines) {
      if (!mrzParse || lines.length === 0) return null;
      try {
        let patched = [...lines];
        if (patched.length === 3 && patched[0].startsWith('IR')) patched[0] = 'ID' + patched[0].substring(2); // Patch Séjour FR
        return mrzParse(patched);
      } catch (e) { return null; }
    }

    function parsePermisFrManual(line) {
      const norm = normalizeTo(line, 30);
      const prefix = norm.substring(0, 2).replace('DI', 'D1');
      if (prefix !== 'D1') return null;
      const docNum = norm.substring(5, 14).replace(/</g, '');
      const rawExp = norm.substring(15, 21);
      let expiry = '';
      for (let i = 0; i < 6; i++) expiry += /[0-9]/.test(rawExp[i]) ? rawExp[i] : (L2D[rawExp[i]] || '0');
      return {
        valid: docNum.length >= 5, format: 'PERMIS_FR', documentNumber: docNum,
        fields: { documentType: 'PERMIS DE CONDUIRE', issuingState: 'FRA', documentNumber: docNum, expirationDate: expiry }
      };
    }

    function parseMrzAdvanced(rawText) {
      const candidates = extractCandidateLines(rawText);
      if (candidates.length === 0) return null;

      // 1. Essayer de parser directement les meilleures lignes
      let topLines = candidates.slice(0, 3).map(c => c.line);
      let res = tryMrzParse(topLines);
      if (res) return res;

      // 2. Correction par masque
      const MASK_TD1_L1 = 'AAAAAXXXXXXXXDXXXXXXXXXXXXXXXX';
      const MASK_TD1_L2 = 'DDDDDDDXDDDDDDDAAAXXXXXXXXXXX';
      const MASK_TD3_L2 = 'XXXXXXXXXDAAADDDDDDDXDDDDDDXXXXXXXXXXXXXXXDD';
      
      const td3Lines = candidates.filter(c => c.len >= 38).slice(0,2).map(c => normalizeTo(c.line, 44));
      if (td3Lines.length === 2) {
        td3Lines[1] = correctByMask(td3Lines[1], MASK_TD3_L2);
        res = tryMrzParse(td3Lines);
        if (res) return res;
      }

      const td1Lines = candidates.filter(c => c.len >= 28 && c.len <= 34).slice(0,3).map(c => normalizeTo(c.line, 30));
      if (td1Lines.length >= 2) {
        td1Lines[0] = correctByMask(td1Lines[0], MASK_TD1_L1);
        td1Lines[1] = correctByMask(td1Lines[1], MASK_TD1_L2);
        if(td1Lines.length === 2) td1Lines.push('<'.repeat(30));
        res = tryMrzParse(td1Lines);
        if (res) return res;
      }

      // 3. Permis de conduire (Non ICAO)
      const permisLine = candidates.find(c => /^[D0][1I]/.test(c.line));
      if (permisLine) return parsePermisFrManual(permisLine.line);

      return null;
    }

    // Extraction des champs visibles (si MRZ incomplet)
    function extractVisibleFields(text) {
      const r = { lastName: null, firstName: null, docType: null };
      if (!text) return r;
      const upper = text.toUpperCase();
      
      if (upper.includes('PERMIS') && upper.includes('CONDUIRE')) r.docType = 'PERMIS_FR';
      else if (upper.includes('PASSEPORT') || upper.includes('PASSPORT')) r.docType = 'PASSEPORT';
      else if (upper.includes('IDENTIT')) r.docType = 'CNI';
      else if (upper.includes('SEJOUR')) r.docType = 'TITRE_SEJOUR';

      const lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
      for (let i = 0; i < lines.length; i++) {
        if (!r.lastName) {
          const m = lines[i].match(/(?:NOM|SURNAME|1[.\s:]+)[\s:]+([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']{2,})/i);
          if (m) r.lastName = m[1].trim();
        }
        if (!r.firstName) {
          const m = lines[i].match(/(?:PRENOM|PRÉNOM|GIVEN|2[.\s:]+)[\s:]+([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸ\s\-']{2,})/i);
          if (m) r.firstName = m[1].trim();
        }
      }
      return r;
    }

    function processExtractedText(rawText) {
      if (!rawText) return null;
      let mrzResult = parseMrzAdvanced(rawText);
      const visible = extractVisibleFields(rawText);
      
      const merged = {
        valid: mrzResult ? mrzResult.valid : false,
        format: mrzResult ? mrzResult.format : (visible.docType || 'INCONNU'),
        documentNumber: mrzResult ? mrzResult.documentNumber : null,
        fields: mrzResult && mrzResult.fields ? { ...mrzResult.fields } : {},
        _raw: rawText
      };

      if (selectedDocType !== 'AUTO' && merged.format === 'INCONNU') merged.format = selectedDocType;
      if (visible.lastName && !merged.fields.lastName) merged.fields.lastName = visible.lastName;
      if (visible.firstName && !merged.fields.firstName) merged.fields.firstName = visible.firstName;
      if (visible.docType && !merged.fields.documentType) merged.fields.documentType = visible.docType;

      return merged;
    }

    // =====================================================================
    // LECTURE & VIDÉO
    // =====================================================================
    async function extractTextFromImage(imageSource) {
      let srcW = imageSource === 'camera' ? video.videoWidth : imageSource.width;
      let srcH = imageSource === 'camera' ? video.videoHeight : imageSource.height;
      
      canvas.width = srcW; canvas.height = srcH;
      if (imageSource === 'camera') ctx.drawImage(video, 0, 0, srcW, srcH);
      else ctx.drawImage(imageSource, 0, 0, srcW, srcH);

      if (ocrEngine === 'NATIVE') {
        try {
          const detector = new TextDetector();
          const detectedTexts = await detector.detect(canvas);
          return detectedTexts.map(t => t.rawValue).join('\n');
        } catch (e) { return ""; }
      } else {
        ctx.filter = 'contrast(1.5) grayscale(1)';
        ctx.drawImage(canvas, 0, 0);
        ctx.filter = 'none';
        const { data } = await tesseractWorker.recognize(canvas);
        return data.text;
      }
    }

    async function startCamera() {
      switchView('scanning');
      isScanning = true;
      document.getElementById('scan-feedback').innerText = "Recherche de la zone MRZ...";
      document.getElementById('scan-debug').innerText = "";
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = stream;
        await video.play();
        scanLoop();
      } catch (err) {
        document.getElementById('scan-feedback').innerText = "Erreur Caméra. Veuillez autoriser l'accès.";
      }
    }

    function cancelScan() {
      isScanning = false;
      if (scanTimeout) clearTimeout(scanTimeout);
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      switchView('ready');
    }

    // Bouton de capture manuelle (si l'auto-focus est capricieux)
    async function forceCapture() {
      if (!isScanning) return;
      isScanning = false; // Stop la boucle
      if (scanTimeout) clearTimeout(scanTimeout);
      
      document.getElementById('scan-feedback').innerText = "Analyse forcée en cours...";
      const rawText = await extractTextFromImage('camera');
      const result = processExtractedText(rawText) || { valid: false, fields: {}, _raw: rawText };
      
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      showResult(result);
    }

    async function scanLoop() {
      if (!isScanning || !video.srcObject || video.paused) return;

      try {
        lastRawText = await extractTextFromImage('camera');
        
        // Debug UI (affiche les lignes qui ressemblent à du MRZ)
        const lines = lastRawText.split('\n').filter(l => l.includes('<') && l.length > 10);
        if(lines.length > 0) document.getElementById('scan-debug').innerText = lines[0].substring(0, 40) + "...";

        const result = processExtractedText(lastRawText);

        // CONDITION DE SUCCÈS ASSOUPLIE :
        // Soit le checksum est parfait (valid: true)
        // Soit on a trouvé au moins le numéro du doc ET le nom de famille (suffisant pour le résultat)
        if (result && (result.valid || (result.documentNumber && result.fields.lastName))) {
          isScanning = false;
          if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
          showResult(result);
          return;
        }
      } catch (e) { console.error(e); }

      const delay = ocrEngine === 'NATIVE' ? 150 : 800;
      scanTimeout = setTimeout(scanLoop, delay);
    }

    // =====================================================================
    // IMPORTATION PHOTO
    // =====================================================================
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      switchView('loading');
      document.getElementById('load-status').innerText = "Analyse de l'image...";
      
      const img = new Image();
      img.onload = async () => {
        try {
          const rawText = await extractTextFromImage(img);
          const result = processExtractedText(rawText);
          showResult(result || { valid: false, fields: {}, _raw: rawText, format: 'INCONNU' });
        } catch (e) {
          showResult({ valid: false, fields: {}, _raw: "Erreur de lecture", format: 'INCONNU' });
        }
      };
      img.src = URL.createObjectURL(file);
    }

    // =====================================================================
    // RÉSULTATS & COPIE
    // =====================================================================
    function resetApp() { switchView('ready'); }

    function formatField(key, val) {
      if (!val) return null;
      if (key.toLowerCase().includes('date') && val.length === 6) {
        return val.substring(4,6) + '.' + val.substring(2,4) + '.' + (parseInt(val.substring(0,2)) > 50 ? '19' : '20') + val.substring(0,2);
      }
      return val;
    }

    function mapFormatName(fmt) {
      if(fmt === 'TD3') return 'Passeport';
      if(fmt === 'TD1') return 'Carte d\'Identité / Titre de Séjour';
      if(fmt === 'PERMIS_FR') return 'Permis de Conduire';
      return fmt;
    }

    function addFieldUI(container, key, value, labelIconPair) {
      const row = document.createElement('div');
      row.className = 'field-row';
      const [icon, label] = labelIconPair;
      
      row.innerHTML = `<span class="text-lg">${icon}</span><span class="field-label">${label}</span><span class="field-value">${value}</span>`;
      finalFields[label] = value;

      row.addEventListener('click', () => {
        navigator.clipboard.writeText(value).then(() => showToast(`✅ ${label} copié !`)).catch(()=>{});
      });
      container.appendChild(row);
    }

    function showResult(result) {
      switchView('result');
      finalFields = {}; 
      
      const badge = document.getElementById('res-valid-badge');
      if (result.valid) {
        badge.className = 'valid-badge'; badge.innerText = '✅ VALIDE';
      } else if (result.fields && Object.keys(result.fields).length > 0) {
        badge.className = 'warn-badge'; badge.innerText = '⚠️ PARTIEL';
      } else {
        badge.className = 'invalid-badge'; badge.innerText = '❌ ÉCHEC';
      }

      document.getElementById('res-format').innerText = "Format : " + mapFormatName(result.format || "Inconnu");
      document.getElementById('res-raw').innerText = result._raw || "Aucun texte détecté";

      const container = document.getElementById('res-fields');
      container.innerHTML = '';

      if (result.fields && Object.keys(result.fields).length > 0) {
        for (const key of FIELD_ORDER) {
          const rawVal = result.fields[key] || (key === 'documentNumber' ? result.documentNumber : null);
          const val = formatField(key, rawVal);
          if (val) addFieldUI(container, key, val, LABELS[key] || ['📋', key]);
        }
        
        for (const [key, rawVal] of Object.entries(result.fields)) {
          if (!FIELD_ORDER.includes(key) && rawVal) {
            const val = formatField(key, rawVal);
            if (val) addFieldUI(container, key, val, LABELS[key] || ['📋', key]);
          }
        }
      } else {
        container.innerHTML = `<p class="text-sm text-slate-400 text-center py-4">Impossible d'extraire les champs. Utilisez le bouton "📸 Capturer" ou importez une photo plus nette.</p>`;
      }
    }

    function copyAllFields() {
      if (Object.keys(finalFields).length === 0) return;
      const text = Object.entries(finalFields).map(([label, value]) => `${label} : ${value}`).join('\n');
      
      navigator.clipboard.writeText(text).then(() => showToast('✅ Tous les champs copiés !')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        showToast('✅ Tous les champs copiés !');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('copy-toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }
  </script>
</body>
</html>

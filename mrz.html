<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner MRZ — Praxis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #fff;
      margin: 0;
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: flex;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .field-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #94a3b8;
      min-width: 3rem;
    }

    .field-value {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      flex: 1;
    }

    .valid-badge {
      background: #22c55e22;
      color: #22c55e;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .invalid-badge {
      background: #ef444422;
      color: #ef4444;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- 1. CHARGEMENT -->
  <div id="view-loading"
    class="view active fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-6">🛂</div>
    <h1 class="text-xl font-bold mb-2">Scanner MRZ</h1>
    <p class="text-slate-500 text-sm mb-6 text-center">Chargement du moteur OCR...</p>
    <div class="w-full max-w-xs bg-slate-800 rounded-full h-2 overflow-hidden">
      <div id="load-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="load-status" class="text-slate-600 text-xs mt-3 font-mono">Initialisation...</p>
    <p id="load-error" class="text-red-500 text-xs mt-2 font-mono hidden"></p>
  </div>

  <!-- 2. PRÊT -->
  <div id="view-ready" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🛂</div>
      <h1 class="text-2xl font-bold mb-2">Scanner MRZ</h1>
      <p class="text-slate-400 text-sm">Passeport · CNI · Permis · Titre de séjour</p>
      <p class="text-slate-600 text-xs mt-2">Parser ICAO 9303 certifié</p>
    </div>
    <button onclick="startCamera()"
      class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all">
      📷 Scanner avec la caméra
    </button>
    <label
      class="w-full max-w-sm mt-3 bg-white/10 hover:bg-white/15 py-4 rounded-xl font-bold text-lg transition-all text-center cursor-pointer block">
      📁 Importer une photo
      <input type="file" id="fileUpload" accept="image/*" class="hidden" />
    </label>
    <a href="1.html" class="mt-6 text-slate-500 hover:text-slate-300 text-sm flex items-center gap-1 transition-colors">
      ← Retour
    </a>
  </div>

  <!-- 3. SCANNER CAMÉRA -->
  <div id="view-scanning" class="view fixed inset-0 z-50 bg-black flex flex-col">
    <video id="video-stream" class="w-full h-full object-cover" playsinline muted></video>

    <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
      <div
        class="w-[90%] max-w-[500px] h-[120px] border-2 border-dashed border-blue-400 rounded-xl shadow-[0_0_0_9999px_rgba(0,0,0,0.7)] relative"
        style="margin-top: 30vh;">
        <div class="absolute inset-0 bg-blue-400/5 animate-pulse rounded-xl"></div>
        <div
          class="absolute -top-8 left-0 w-full text-center text-blue-400 font-bold text-xs tracking-widest uppercase">
          Cadrez la bande MRZ ici
        </div>
      </div>
    </div>

    <div class="absolute bottom-6 left-0 w-full px-6 space-y-3">
      <div class="bg-slate-900/90 backdrop-blur-xl p-4 rounded-2xl border border-slate-800">
        <p id="scan-feedback" class="text-sm font-medium text-center">Démarrage...</p>
        <p id="scan-debug" class="text-[10px] font-mono text-slate-600 mt-1 text-center truncate"></p>
      </div>
      <button onclick="cancelScan()"
        class="w-full bg-white/10 backdrop-blur-md py-3.5 rounded-xl font-bold border border-white/10 text-sm">
        Annuler
      </button>
    </div>
  </div>

  <!-- 4. PROCESSING (pour upload photo) -->
  <div id="view-processing" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-4 animate-spin">⏳</div>
    <p id="proc-status" class="text-slate-400 text-sm">Analyse en cours...</p>
  </div>

  <!-- 5. RÉSULTAT -->
  <div id="view-result" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col overflow-y-auto">
    <div class="px-6 py-8 flex-1">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Résultat MRZ</h2>
        <span id="res-valid-badge" class="valid-badge">—</span>
      </div>

      <div id="res-format" class="text-xs text-slate-500 font-mono mb-4">—</div>

      <div id="res-fields" class="space-y-2 mb-6"></div>

      <details class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
        <summary class="text-xs text-slate-500 cursor-pointer">Données brutes OCR</summary>
        <pre id="res-raw" class="text-[11px] font-mono text-slate-400 mt-3 whitespace-pre-wrap break-all"></pre>
      </details>
    </div>
    <div class="px-6 pb-8">
      <button onclick="resetApp()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">
        Nouveau scan
      </button>
    </div>
  </div>

  <canvas id="canvas-mrz" class="hidden"></canvas>

  <!-- Tesseract.js v5 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script>
    // =========================================================================
    // MRZ SCANNER v4 — Tesseract.js v5 + mrz@5 parser ICAO 9303
    // =========================================================================

    let ocrWorker = null;
    let inferenceTimeout = null;
    let isRecognizing = false;
    let mrzParse = null; // Fonction parse() du module mrz

    const views = {
      loading: document.getElementById('view-loading'),
      ready: document.getElementById('view-ready'),
      scanning: document.getElementById('view-scanning'),
      processing: document.getElementById('view-processing'),
      result: document.getElementById('view-result'),
    };
    const video = document.getElementById('video-stream');
    const canvas = document.getElementById('canvas-mrz');
    const scanFeedback = document.getElementById('scan-feedback');

    function switchView(name) {
      Object.values(views).forEach(v => { v.classList.remove('active'); v.classList.add('hidden'); });
      views[name].classList.add('active');
      views[name].classList.remove('hidden');
    }

    function setLoadStatus(text) {
      document.getElementById('load-status').innerText = text;
      console.log('[MRZ]', text);
    }

    function setLoadProgress(pct) {
      document.getElementById('load-progress').style.width = pct + '%';
    }

    function showLoadError(text) {
      const el = document.getElementById('load-error');
      el.innerText = text;
      el.classList.remove('hidden');
      console.error('[MRZ ERROR]', text);
    }

    // ===== 1. CHARGEMENT =====
    async function loadEngine() {
      try {
        // Étape 1 : Charger le parser mrz via import() dynamique
        setLoadStatus('Chargement du parser ICAO MRZ...');
        setLoadProgress(10);

        try {
          const mrzModule = await import('https://esm.sh/mrz@5');
          mrzParse = mrzModule.parse;
          console.log('✅ mrz parser v5 chargé via esm.sh');
        } catch (e1) {
          console.warn('esm.sh échoué, tentative esm.run...', e1);
          try {
            const mrzModule2 = await import('https://esm.run/mrz@5');
            mrzParse = mrzModule2.parse;
            console.log('✅ mrz parser v5 chargé via esm.run');
          } catch (e2) {
            console.warn('esm.run échoué aussi, parser non disponible', e2);
            mrzParse = null;
          }
        }

        setLoadProgress(30);
        setLoadStatus('Chargement du moteur OCR Tesseract...');

        // Étape 2 : Créer le worker Tesseract.js v5
        ocrWorker = await Tesseract.createWorker('eng', 1, {
          logger: (m) => {
            if (m.progress !== undefined) {
              const pct = 30 + Math.round(m.progress * 60);
              setLoadProgress(pct);
            }
            if (m.status) setLoadStatus(m.status);
          }
        });

        // Whitelist MRZ (comme uwolfer) + PSM 6 (bloc)
        await ocrWorker.setParameters({
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<',
          tessedit_pageseg_mode: '6',
        });

        setLoadProgress(100);
        setLoadStatus('Prêt !');
        console.log('✅ Tesseract prêt, parser mrz:', mrzParse ? 'OUI' : 'NON');

        setTimeout(() => switchView('ready'), 400);
      } catch (err) {
        showLoadError('Erreur fatale: ' + err.message);
        console.error(err);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadEngine();
      // Upload fichier
      document.getElementById('fileUpload').addEventListener('change', handleFileUpload);
    });

    // ===== 2. CAMÉRA =====
    async function startCamera() {
      switchView('scanning');
      scanFeedback.innerText = 'Démarrage caméra...';
      isRecognizing = false;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        await video.play();
        scanFeedback.innerText = 'Cadrez la bande MRZ...';
        inferenceLoop();
      } catch (err) {
        scanFeedback.innerText = 'Erreur caméra: ' + err.message;
        console.error(err);
      }
    }

    function stopCamera() {
      if (inferenceTimeout) { clearTimeout(inferenceTimeout); inferenceTimeout = null; }
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
    }

    function cancelScan() { stopCamera(); switchView('ready'); }
    function resetApp() { switchView('ready'); }

    // ===== 3. BOUCLE D'INFÉRENCE =====
    async function inferenceLoop() {
      if (!video.srcObject || video.paused || video.ended) return;

      if (!isRecognizing && ocrWorker) {
        isRecognizing = true;
        try {
          const ctx = canvas.getContext('2d', { willReadFrequently: true });

          // Capturer la zone MRZ (bande inférieure = 30% bas de l'image)
          const srcW = video.videoWidth;
          const srcH = video.videoHeight;
          const cropH = Math.round(srcH * 0.30);
          const cropY = srcH - cropH;

          canvas.width = srcW;
          canvas.height = cropH;

          // Haut contraste noir/blanc
          ctx.filter = 'contrast(2.0) grayscale(1)';
          ctx.drawImage(video, 0, cropY, srcW, cropH, 0, 0, srcW, cropH);
          ctx.filter = 'none';

          const dataUrl = canvas.toDataURL('image/png');
          scanFeedback.innerText = 'Analyse OCR...';

          const { data } = await ocrWorker.recognize(dataUrl);
          const mrzLines = extractMrzLines(data.text);

          const debugEl = document.getElementById('scan-debug');
          if (debugEl) debugEl.innerText = data.text.replace(/\n/g, ' | ').substring(0, 120);

          if (mrzLines.length >= 1) {
            scanFeedback.innerText = 'MRZ détectée ! Parsing...';
            console.log('MRZ candidates:', mrzLines);

            const result = tryParseMrz(mrzLines);
            if (result) {
              showMrzResult(result, mrzLines, data.text);
              return;
            }
          }

          scanFeedback.innerText = 'Cadrez la bande MRZ...';
        } catch (e) {
          console.error('OCR error:', e);
        } finally {
          isRecognizing = false;
        }
      }

      inferenceTimeout = setTimeout(inferenceLoop, 1200);
    }

    // ===== 4. UPLOAD PHOTO =====
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file || !ocrWorker) return;

      switchView('processing');
      document.getElementById('proc-status').innerText = 'Chargement de l\'image...';

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = async () => {
          try {
            document.getElementById('proc-status').innerText = 'Analyse OCR...';

            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;

            ctx.filter = 'contrast(1.8) grayscale(1)';
            ctx.drawImage(img, 0, 0);
            ctx.filter = 'none';

            const dataUrl = canvas.toDataURL('image/png');
            const { data } = await ocrWorker.recognize(dataUrl);

            console.log('OCR text:', data.text);

            const mrzLines = extractMrzLines(data.text);
            console.log('MRZ lines:', mrzLines);

            if (mrzLines.length >= 1) {
              const result = tryParseMrz(mrzLines);
              if (result) {
                showMrzResult(result, mrzLines, data.text);
                return;
              }
            }

            // Fallback: afficher le texte brut
            showRawResult(data.text, 'Aucune ligne MRZ valide trouvée dans l\'image');
          } catch (err) {
            console.error('Erreur upload:', err);
            showRawResult('', 'Erreur: ' + err.message);
          }
        };
        img.onerror = () => showRawResult('', 'Impossible de charger l\'image');
        img.src = e.target.result;
      };
      reader.onerror = () => showRawResult('', 'Impossible de lire le fichier');
      reader.readAsDataURL(file);

      // Reset input pour permettre de recharger le même fichier
      event.target.value = '';
    }

    // ===== 5. EXTRACTION LIGNES MRZ =====
    function extractMrzLines(rawText) {
      const lines = rawText.split('\n');
      const candidates = [];

      for (const raw of lines) {
        // Nettoyer : supprimer espaces, remplacer chars parasites par <
        let clean = raw.toUpperCase()
          .replace(/\s+/g, '')
          .replace(/[^A-Z0-9<]/g, '');

        // Filtrer par longueur MRZ (28-46 chars)
        if (clean.length < 28 || clean.length > 46) continue;

        // Doit contenir << (séparateur ICAO) OU commencer par un préfixe MRZ
        if (clean.includes('<<') || /^[PID][A-Z<]/.test(clean) || /^D1/.test(clean)) {
          candidates.push(clean);
        }
      }

      return candidates;
    }

    // ===== 6. PARSING MRZ =====
    function tryParseMrz(mrzLines) {
      // Méthode 1 : Parser mrz certifié ICAO
      if (mrzParse) {
        try {
          const result = mrzParse(mrzLines);
          console.log('mrz.parse() result:', result);
          return result;
        } catch (e) {
          console.warn('mrz.parse() échec:', e.message);
          // Tenter avec différentes combinaisons de lignes
          if (mrzLines.length > 2) {
            // Essayer les 2 dernières lignes (TD3) ou les 3 dernières (TD1)
            for (let start = 0; start <= mrzLines.length - 2; start++) {
              try {
                const subset = mrzLines.slice(start, start + 2);
                const r = mrzParse(subset);
                if (r) return r;
              } catch (e2) { /* ignorer */ }
              if (start + 3 <= mrzLines.length) {
                try {
                  const subset = mrzLines.slice(start, start + 3);
                  const r = mrzParse(subset);
                  if (r) return r;
                } catch (e3) { /* ignorer */ }
              }
            }
          }
        }
      }
      return null;
    }

    // ===== 7. AFFICHAGE =====

    const FIELD_LABELS = {
      documentType: { icon: '📄', label: 'Type de document' },
      documentNumber: { icon: '🔢', label: 'N° Document' },
      issuingState: { icon: '🏳️', label: 'Pays émetteur' },
      lastName: { icon: '👤', label: 'Nom' },
      firstName: { icon: '👤', label: 'Prénom' },
      nationality: { icon: '🌍', label: 'Nationalité' },
      birthDate: { icon: '🎂', label: 'Date de naissance' },
      sex: { icon: '⚧', label: 'Sexe' },
      expirationDate: { icon: '📅', label: 'Expiration' },
      personalNumber: { icon: '🔑', label: 'N° Personnel' },
      optional1: { icon: '📋', label: 'Optionnel 1' },
      optional2: { icon: '📋', label: 'Optionnel 2' },
      issueDate: { icon: '📅', label: 'Date d\'émission' },
      compositeCheck: { icon: '✅', label: 'Check global' },
    };

    function formatDate(dateStr) {
      if (!dateStr || dateStr.length !== 6) return dateStr || '—';
      const yy = dateStr.substring(0, 2);
      const mm = dateStr.substring(2, 4);
      const dd = dateStr.substring(4, 6);
      const century = parseInt(yy) > 50 ? '19' : '20';
      return dd + '.' + mm + '.' + century + yy;
    }

    function showMrzResult(result, mrzLines, rawText) {
      stopCamera();

      // Badge validité
      const badge = document.getElementById('res-valid-badge');
      badge.className = result.valid ? 'valid-badge' : 'invalid-badge';
      badge.innerText = result.valid ? '✅ VALIDE' : '⚠️ ERREURS';

      // Format
      document.getElementById('res-format').innerText = 'Format: ' + (result.format || '?');

      // Champs
      const container = document.getElementById('res-fields');
      container.innerHTML = '';

      // N° document composite (priorité haute)
      if (result.documentNumber) {
        addFieldRow(container, '🆔', 'N° Document', result.documentNumber, true);
      }

      // Tous les fields
      if (result.fields) {
        for (const [key, value] of Object.entries(result.fields)) {
          if (!value && value !== '') continue;
          const meta = FIELD_LABELS[key] || { icon: '📋', label: key };
          let displayVal = value || '—';
          if ((key.includes('Date') || key.includes('date')) && typeof displayVal === 'string' && displayVal.length === 6) {
            displayVal = formatDate(displayVal);
          }
          addFieldRow(container, meta.icon, meta.label, displayVal);
        }
      }

      // Détails de validation (erreurs)
      if (result.details) {
        const errors = result.details.filter(d => !d.valid && d.error);
        if (errors.length > 0) {
          const errDiv = document.createElement('div');
          errDiv.className = 'mt-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs text-red-400';
          errDiv.innerHTML = '<strong>Erreurs :</strong><br>' +
            errors.map(d => '• ' + (d.label || d.field || '?') + ': ' + d.error).join('<br>');
          container.appendChild(errDiv);
        }
      }

      // Données brutes
      document.getElementById('res-raw').innerText =
        'MRZ lignes:\n' + mrzLines.join('\n') +
        '\n\nTexte OCR complet:\n' + (rawText || '').substring(0, 500);

      switchView('result');
    }

    function addFieldRow(container, icon, label, value, highlight) {
      const row = document.createElement('div');
      row.className = 'field-row';
      if (highlight) {
        row.style.background = 'rgba(59,130,246,0.1)';
        row.style.border = '1px solid rgba(59,130,246,0.2)';
      }
      row.innerHTML = `
        <span class="text-lg">${icon}</span>
        <span class="field-label">${label}</span>
        <span class="field-value" ${highlight ? 'style="color:#60a5fa;font-family:monospace;"' : ''}>${value}</span>
      `;
      container.appendChild(row);
    }

    function showRawResult(rawText, errorMessage) {
      stopCamera();
      document.getElementById('res-valid-badge').className = 'invalid-badge';
      document.getElementById('res-valid-badge').innerText = '❌ ÉCHEC';
      document.getElementById('res-format').innerText = errorMessage;
      document.getElementById('res-fields').innerHTML =
        '<div class="field-row"><span class="field-value text-slate-500">Aucun MRZ détecté</span></div>';
      document.getElementById('res-raw').innerText = rawText || '(aucune donnée)';
      switchView('result');
    }
  </script>
</body>

</html>

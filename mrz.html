<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner MRZ — Praxis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #fff;
      margin: 0;
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: flex;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .field-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #94a3b8;
      min-width: 3rem;
    }

    .field-value {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      flex: 1;
      word-break: break-all;
    }

    .valid-badge {
      background: #22c55e22;
      color: #22c55e;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .invalid-badge {
      background: #ef444422;
      color: #ef4444;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .warn-badge {
      background: #f59e0b22;
      color: #f59e0b;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- 1. CHARGEMENT -->
  <div id="view-loading"
    class="view active fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-6">🛂</div>
    <h1 class="text-xl font-bold mb-2">Scanner MRZ</h1>
    <p class="text-slate-500 text-sm mb-6 text-center">Chargement du moteur OCR + parser ICAO...</p>
    <div class="w-full max-w-xs bg-slate-800 rounded-full h-2 overflow-hidden">
      <div id="load-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="load-status" class="text-slate-600 text-xs mt-3 font-mono">Initialisation...</p>
  </div>

  <!-- 2. PRÊT -->
  <div id="view-ready" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🛂</div>
      <h1 class="text-2xl font-bold mb-2">Scanner MRZ</h1>
      <p class="text-slate-400 text-sm">Passeport · CNI · Permis · Titre de séjour</p>
    </div>
    <button onclick="startCamera()"
      class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all">
      📷 Scanner avec la caméra
    </button>
    <label
      class="w-full max-w-sm mt-3 bg-white/10 hover:bg-white/15 py-4 rounded-xl font-bold text-lg transition-all text-center cursor-pointer block">
      📁 Importer une photo
      <input type="file" id="fileUpload" accept="image/*" class="hidden" />
    </label>
    <a href="1.html" class="mt-6 text-slate-500 hover:text-slate-300 text-sm flex items-center gap-1 transition-colors">
      ← Retour
    </a>
  </div>

  <!-- 3. SCANNER CAMÉRA -->
  <div id="view-scanning" class="view fixed inset-0 z-50 bg-black flex flex-col">
    <video id="video-stream" class="w-full h-full object-cover" playsinline muted></video>
    <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-end pb-40">
      <div class="w-[92%] max-w-[520px] h-[100px] border-2 border-dashed border-blue-400 rounded-lg relative">
        <div class="absolute inset-0 bg-blue-400/5 animate-pulse rounded-lg"></div>
        <div
          class="absolute -top-7 left-0 w-full text-center text-blue-400 font-bold text-[11px] tracking-widest uppercase">
          Bande MRZ
        </div>
      </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full px-4 pb-4 space-y-3">
      <div class="bg-black/80 backdrop-blur-xl p-3 rounded-2xl border border-slate-800">
        <p id="scan-feedback" class="text-xs font-medium text-center text-slate-300">Démarrage...</p>
        <p id="scan-debug" class="text-[9px] font-mono text-slate-700 mt-1 text-center truncate"></p>
        <div class="flex gap-2 mt-2">
          <button onclick="cancelScan()"
            class="flex-1 bg-white/10 py-2.5 rounded-xl font-bold border border-white/10 text-xs">Annuler</button>
          <button onclick="manualCapture()" class="flex-1 bg-blue-600 py-2.5 rounded-xl font-bold text-xs">📸
            Capturer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. PROCESSING -->
  <div id="view-processing" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-4 animate-spin">⏳</div>
    <p id="proc-status" class="text-slate-400 text-sm">Analyse en cours...</p>
  </div>

  <!-- 5. RÉSULTAT -->
  <div id="view-result" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col overflow-y-auto">
    <div class="px-6 py-8 flex-1">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Résultat</h2>
        <span id="res-valid-badge" class="valid-badge">—</span>
      </div>
      <div id="res-format" class="text-xs text-slate-500 font-mono mb-4">—</div>
      <div id="res-fields" class="space-y-2 mb-6"></div>
      <details class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
        <summary class="text-xs text-slate-500 cursor-pointer">Données brutes OCR + debug</summary>
        <pre id="res-raw" class="text-[10px] font-mono text-slate-500 mt-3 whitespace-pre-wrap break-all"></pre>
      </details>
    </div>
    <div class="px-6 pb-8">
      <button onclick="resetApp()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Nouveau scan</button>
    </div>
  </div>

  <canvas id="canvas-mrz" class="hidden"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    // =========================================================================
    // MRZ SCANNER v5 — ROBUSTE
    // Tesseract.js v5 + mrz@5 parser ICAO + correction OCR agressive
    // Supporte : Passeport FR (TD3), CNI nouvelle (TD1), CNI ancienne (2×36),
    //            Permis FR (1×30), Titre de séjour (TD1/TD2), Visa (MRVA/MRVB)
    // =========================================================================

    let ocrWorker = null;
    let inferenceTimeout = null;
    let isRecognizing = false;
    let mrzParse = null;

    const views = {};
    let video, canvas, scanFeedback;

    function init() {
      ['loading', 'ready', 'scanning', 'processing', 'result'].forEach(n => {
        views[n] = document.getElementById('view-' + n);
      });
      video = document.getElementById('video-stream');
      canvas = document.getElementById('canvas-mrz');
      scanFeedback = document.getElementById('scan-feedback');
      document.getElementById('fileUpload').addEventListener('change', handleFileUpload);
      loadEngine();
    }

    function switchView(name) {
      Object.values(views).forEach(v => { v.classList.remove('active'); v.classList.add('hidden'); });
      views[name].classList.add('active');
      views[name].classList.remove('hidden');
    }

    // =====================================================================
    // 1. CHARGEMENT
    // =====================================================================
    async function loadEngine() {
      const status = document.getElementById('load-status');
      const bar = document.getElementById('load-progress');
      const log = (t) => { status.innerText = t; console.log('[MRZ]', t); };

      try {
        log('Chargement parser ICAO...');
        bar.style.width = '10%';

        // Charger mrz parser (essayer plusieurs CDN)
        const cdns = ['https://esm.sh/mrz@5', 'https://esm.run/mrz@5'];
        for (const cdn of cdns) {
          try {
            const mod = await import(cdn);
            mrzParse = mod.parse;
            console.log('✅ mrz@5 chargé via ' + cdn);
            break;
          } catch (e) { console.warn('CDN échoué:', cdn, e.message); }
        }

        bar.style.width = '25%';
        log('Chargement moteur OCR...');

        ocrWorker = await Tesseract.createWorker('eng', 1, {
          logger: (m) => {
            if (m.progress !== undefined) bar.style.width = (25 + Math.round(m.progress * 65)) + '%';
            if (m.status) log(m.status);
          }
        });

        // Config MRZ : whitelist stricte + mode bloc
        await ocrWorker.setParameters({
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<',
          tessedit_pageseg_mode: '6',
        });

        bar.style.width = '100%';
        log('Prêt ! (' + (mrzParse ? 'Parser ICAO actif' : '⚠️ Parser non chargé') + ')');
        setTimeout(() => switchView('ready'), 400);
      } catch (err) {
        log('ERREUR: ' + err.message);
        console.error(err);
      }
    }

    // =====================================================================
    // 2. CORRECTION OCR AGRESSIVE
    // =====================================================================

    // Table de substitution OCR pour les positions où on attend un chiffre
    const LETTER_TO_DIGIT = {
      'O': '0', 'Q': '0', 'D': '0', 'U': '0',
      'I': '1', 'L': '1', 'J': '1',
      'Z': '2',
      'A': '4',
      'S': '5',
      'G': '6', 'C': '6',
      'T': '7',
      'B': '8',
      'P': '9',
    };

    // Table inverse pour les positions où on attend une lettre
    const DIGIT_TO_LETTER = {
      '0': 'O', '1': 'I', '2': 'Z', '4': 'A', '5': 'S', '6': 'G', '8': 'B', '9': 'P',
    };

    /**
     * Nettoie une ligne OCR brute pour en faire une ligne MRZ exploitable.
     * C'est l'étape la plus critique pour la fiabilité.
     */
    function sanitizeLine(raw) {
      return raw
        .toUpperCase()
        // Les espaces dans une MRZ sont TOUJOURS des < (chevrons)
        .replace(/[\s]+/g, '<')
        // Caractères fréquemment confondus avec <
        .replace(/[.,;:_\-|!`'"~^°]+/g, '<')
        // Parenthèses, crochets → <
        .replace(/[\[\](){}]+/g, '<')
        // Ne garder que les chars MRZ valides
        .replace(/[^A-Z0-9<]/g, '')
        // Supprimer les < isolés en début de ligne (bruit)
        .replace(/^<+/, '')
        .trim();
    }

    /**
     * Corrige une ligne MRZ en appliquant le masque ICAO.
     * mask[i] = 'D' → forcer chiffre, 'A' → forcer lettre, 'X' → laisser
     */
    function correctByMask(line, mask) {
      let out = '';
      for (let i = 0; i < line.length && i < mask.length; i++) {
        const c = line[i];
        const m = mask[i];
        if (m === 'D') {
          out += /[0-9]/.test(c) ? c : (LETTER_TO_DIGIT[c] || c);
        } else if (m === 'A') {
          out += /[A-Z<]/.test(c) ? c : (DIGIT_TO_LETTER[c] || c);
        } else {
          out += c;
        }
      }
      return out;
    }

    // Masques ICAO par format (D=digit, A=alpha/chevron, X=any)
    // Passeport TD3 ligne 2 (44 chars)
    const MASK_TD3_L2 = 'XXXXXXXXXDAAADDDDDDDXDDDDDDXXXXXXXXXXXXXXXD';
    // CNI TD1 ligne 1 (30 chars)
    const MASK_TD1_L1 = 'AAAAAXXXXXXXXDXXXXXXXXXXXXXXXX'; // ID FRA docnum check optional
    // CNI TD1 ligne 2 (30 chars)
    const MASK_TD1_L2 = 'DDDDDDDXDDDDDDDAAAXXXXXXXXXXX'; // birth check sex expiry check nat optional check
    // Permis FR (30 chars)
    const MASK_PERMIS = 'AAAAAXXXXXXXXDDDDDDDXXXXXXXX'; // D1FRA docnum check expiry check pad

    /**
     * Normalise une ligne MRZ à la longueur standard en paddant avec < ou en tronquant.
     */
    function normalizeTo(line, len) {
      if (line.length === len) return line;
      if (line.length > len) return line.substring(0, len);
      return line + '<'.repeat(len - line.length);
    }

    // =====================================================================
    // 3. EXTRACTION LIGNES MRZ MULTI-FORMATS
    // =====================================================================

    /**
     * Score une ligne nettoyée : plus le score est haut, plus c'est probablement du MRZ.
     */
    function scoreLine(line) {
      if (line.length < 25) return 0;
      let score = 0;

      // Bonus longueur standard
      const len = line.length;
      if (len === 44) score += 40;       // TD3
      else if (len === 30) score += 40;  // TD1 ou Permis
      else if (len === 36) score += 40;  // TD2 ou ancienne CNI
      else if (len >= 28 && len <= 46) score += 15;  // Tolérance ±2
      else return 0;

      // Bonus chevrons (les MRZ en ont toujours)
      const chevrons = (line.match(/</g) || []).length;
      if (chevrons >= 2) score += 10;
      if (chevrons >= 5) score += 10;

      // Bonus double chevron (séparateur nom/prénom) — TRÈS discriminant
      if (line.includes('<<')) score += 20;

      // Bonus préfixes MRZ connus
      if (/^P[<0O]/.test(line)) score += 15;       // Passeport P< ou P0 (OCR error)
      if (/^I[D0][A-Z<]/.test(line)) score += 15;  // CNI ID
      if (/^D[1I][<]?F/.test(line)) score += 15;   // Permis D1FRA
      if (/^V[<A-Z]/.test(line)) score += 10;      // Visa
      if (/^A[CT]/.test(line)) score += 10;         // Autres docs (AC, AT)

      // Bonus FRA dans les premières positions
      if (line.substring(2, 5).replace(/</g, '') === 'FRA') score += 10;

      // Malus si trop de < (ligne probablement vide/bruit)
      if (chevrons > line.length * 0.8) score -= 20;

      return Math.max(0, score);
    }

    /**
     * Extrait TOUTES les lignes MRZ candidates du texte OCR.
     * Retourne un tableau trié par score décroissant.
     */
    function extractCandidateLines(rawText) {
      const lines = rawText.split(/\n/);
      const candidates = [];

      for (const raw of lines) {
        const clean = sanitizeLine(raw);
        if (clean.length < 25) continue;

        const score = scoreLine(clean);
        if (score >= 20) {
          candidates.push({ line: clean, score: score, len: clean.length });
        }
      }

      candidates.sort((a, b) => b.score - a.score);
      return candidates;
    }

    /**
     * Regroupe les lignes candidates par format MRZ probable.
     * Retourne un array de { format, lines } triés par pertinence.
     */
    function groupByFormat(candidates) {
      const groups = [];

      // --- PASSEPORT TD3 : 2 lignes ~44 chars ---
      const td3Lines = candidates.filter(c => c.len >= 42 && c.len <= 46);
      if (td3Lines.length >= 2) {
        // La ligne 1 commence par P< et contient <<, la ligne 2 a des chiffres
        const line1Candidates = td3Lines.filter(c => /^P/.test(c.line) || c.line.includes('<<'));
        const line2Candidates = td3Lines.filter(c => !c.line.includes('<<') || /^\d/.test(c.line.substring(0, 1)));

        if (line1Candidates.length >= 1 && td3Lines.length >= 2) {
          const l1 = line1Candidates[0].line;
          const l2 = td3Lines.find(c => c.line !== l1)?.line || td3Lines[1].line;
          groups.push({
            format: 'TD3',
            lines: [normalizeTo(l1, 44), normalizeTo(l2, 44)],
            score: td3Lines[0].score + (td3Lines[1]?.score || 0),
          });
        }
      }

      // --- CNI/TITRE TD1 : 3 lignes ~30 chars ---
      const td1Lines = candidates.filter(c => c.len >= 28 && c.len <= 32);
      if (td1Lines.length >= 3) {
        groups.push({
          format: 'TD1',
          lines: td1Lines.slice(0, 3).map(c => normalizeTo(c.line, 30)),
          score: td1Lines.slice(0, 3).reduce((s, c) => s + c.score, 0),
        });
      }
      // Même avec 2 lignes TD1, on peut essayer si on ajoute une troisième vide
      if (td1Lines.length === 2) {
        groups.push({
          format: 'TD1',
          lines: [...td1Lines.map(c => normalizeTo(c.line, 30)), '<'.repeat(30)],
          score: td1Lines.reduce((s, c) => s + c.score, 0) - 10,
        });
      }

      // --- ANCIENNE CNI FR / TD2 : 2 lignes ~36 chars ---
      const td2Lines = candidates.filter(c => c.len >= 34 && c.len <= 38);
      if (td2Lines.length >= 2) {
        groups.push({
          format: 'TD2',
          lines: td2Lines.slice(0, 2).map(c => normalizeTo(c.line, 36)),
          score: td2Lines.slice(0, 2).reduce((s, c) => s + c.score, 0),
        });
      }

      // --- PERMIS FR : 1 ligne ~30 chars commençant par D1 ---
      const permisLines = candidates.filter(c => c.len >= 28 && c.len <= 32 && /^D[1I]/.test(c.line));
      if (permisLines.length >= 1) {
        groups.push({
          format: 'PERMIS_FR',
          lines: [normalizeTo(permisLines[0].line, 30)],
          score: permisLines[0].score + 10,
        });
      }

      // Trier par score total décroissant
      groups.sort((a, b) => b.score - a.score);
      return groups;
    }

    // =====================================================================
    // 4. PARSING MULTI-STRATÉGIE
    // =====================================================================

    /**
     * Tente de parser les lignes MRZ avec TOUTES les stratégies possibles.
     * Retourne le meilleur résultat ou null.
     */
    function tryAllParsingStrategies(rawText) {
      const candidates = extractCandidateLines(rawText);
      console.log('[MRZ] Lignes candidates:', candidates.map(c => c.line + ' (score:' + c.score + ')'));

      if (candidates.length === 0) return null;

      const groups = groupByFormat(candidates);
      console.log('[MRZ] Groupes format:', groups.map(g => g.format + ' (' + g.lines.length + ' lignes, score:' + g.score + ')'));

      const results = [];

      for (const group of groups) {
        // Stratégie 1 : Parser mrz ICAO direct
        if (mrzParse) {
          const parsed = tryMrzParse(group.lines, group.format);
          if (parsed) {
            parsed._strategy = 'mrz.parse() direct';
            parsed._score = group.score;
            results.push(parsed);
          }

          // Stratégie 2 : Correction OCR puis re-parse
          const correctedLines = applyCorrectionMasks(group.lines, group.format);
          if (correctedLines) {
            const parsed2 = tryMrzParse(correctedLines, group.format);
            if (parsed2) {
              parsed2._strategy = 'mrz.parse() + OCR correction';
              parsed2._score = group.score + 5;
              results.push(parsed2);
            }
          }
        }

        // Stratégie 3 : Parsing manuel (fallback si mrz parser échoue)
        if (group.format === 'PERMIS_FR') {
          const manual = parsePermisFrManual(group.lines[0]);
          if (manual) {
            manual._strategy = 'Manual permis FR';
            manual._score = group.score;
            results.push(manual);
          }
        }
      }

      if (results.length === 0) return null;

      // Prendre le meilleur : priorité au valid=true, puis au score
      results.sort((a, b) => {
        if (a.valid !== b.valid) return a.valid ? -1 : 1;
        return (b._score || 0) - (a._score || 0);
      });

      console.log('[MRZ] Meilleur résultat:', results[0]._strategy, results[0]);
      return results[0];
    }

    /**
     * Tente mrz.parse() avec gestion d'erreur robuste.
     */
    function tryMrzParse(lines, format) {
      if (!mrzParse) return null;
      try {
        // Le parser mrz accepte un array de strings
        const result = mrzParse(lines);
        console.log('[MRZ] parse(' + format + ') →', result?.valid, result?.format);
        return result;
      } catch (e) {
        console.log('[MRZ] parse(' + format + ') échec:', e.message);
        return null;
      }
    }

    /**
     * Applique les masques de correction OCR selon le format.
     */
    function applyCorrectionMasks(lines, format) {
      const corrected = [...lines];
      try {
        if (format === 'TD3' && lines.length >= 2) {
          // Ligne 2 TD3 : positions connues pour digits/letters
          corrected[1] = correctByMask(lines[1], MASK_TD3_L2);
        } else if (format === 'TD1' && lines.length >= 2) {
          corrected[0] = correctByMask(lines[0], MASK_TD1_L1);
          corrected[1] = correctByMask(lines[1], MASK_TD1_L2);
        } else if (format === 'PERMIS_FR' && lines.length >= 1) {
          corrected[0] = correctByMask(lines[0], MASK_PERMIS);
        }
        return corrected;
      } catch (e) {
        return null;
      }
    }

    /**
     * Parser manuel pour le permis de conduire français.
     * Format: D1FRA [docnum:9] [check:1] [expiry:6] [check:1] [pad]
     */
    function parsePermisFrManual(line) {
      if (line.length < 26) return null;

      const norm = normalizeTo(line, 30);
      // Corriger D1 → forcer les 2 premiers chars
      const prefix = norm.substring(0, 2).replace('DI', 'D1').replace('D|', 'D1');
      const country = norm.substring(2, 5).replace(/</g, '');

      if (prefix !== 'D1' || country !== 'FRA') return null;

      const docNum = norm.substring(5, 14).replace(/</g, '');
      const rawExpiry = norm.substring(15, 21);
      let expiry = '';
      for (let i = 0; i < 6; i++) expiry += /[0-9]/.test(rawExpiry[i]) ? rawExpiry[i] : (LETTER_TO_DIGIT[rawExpiry[i]] || '0');

      return {
        valid: docNum.length >= 5,
        format: 'FRENCH_DRIVING_LICENSE',
        documentNumber: docNum,
        fields: {
          documentType: 'D1',
          issuingState: 'FRA',
          documentNumber: docNum,
          expirationDate: expiry,
        },
        details: [],
        _manual: true,
      };
    }

    // =====================================================================
    // 5. CAMÉRA + BOUCLE OCR
    // =====================================================================

    async function startCamera() {
      switchView('scanning');
      scanFeedback.innerText = 'Démarrage caméra...';
      isRecognizing = false;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = stream;
        await video.play();
        scanFeedback.innerText = 'Cadrez le document...';
        inferenceLoop();
      } catch (err) {
        scanFeedback.innerText = 'Erreur caméra: ' + err.message;
      }
    }

    function stopCamera() {
      if (inferenceTimeout) { clearTimeout(inferenceTimeout); inferenceTimeout = null; }
      if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    }
    function cancelScan() { stopCamera(); switchView('ready'); }
    function resetApp() { switchView('ready'); }

    async function inferenceLoop() {
      if (!video.srcObject || video.paused || video.ended) return;
      if (!isRecognizing && ocrWorker) {
        isRecognizing = true;
        try {
          await processFrame(false);
        } finally {
          isRecognizing = false;
        }
      }
      inferenceTimeout = setTimeout(inferenceLoop, 1500);
    }

    /**
     * Capture et analyse un frame vidéo.
     * fullFrame=true → document entier, false → bande MRZ basse seulement
     */
    async function processFrame(fullFrame) {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const srcW = video.videoWidth;
      const srcH = video.videoHeight;

      let cropY, cropH;
      if (fullFrame) {
        cropY = 0; cropH = srcH;
      } else {
        // Bande basse : 35% inférieur (couvre la MRZ de tous les documents)
        cropH = Math.round(srcH * 0.35);
        cropY = srcH - cropH;
      }

      canvas.width = srcW;
      canvas.height = cropH;

      // Prétraitement agressif
      ctx.filter = 'contrast(2.5) grayscale(1)';
      ctx.drawImage(video, 0, cropY, srcW, cropH, 0, 0, srcW, cropH);
      ctx.filter = 'none';
      binarize(ctx, srcW, cropH);

      const dataUrl = canvas.toDataURL('image/png');
      scanFeedback.innerText = fullFrame ? 'Analyse document entier...' : 'Analyse bande MRZ...';

      const { data } = await ocrWorker.recognize(dataUrl);
      const debugEl = document.getElementById('scan-debug');
      if (debugEl) debugEl.innerText = data.text.replace(/\n/g, '|').substring(0, 120);

      const result = tryAllParsingStrategies(data.text);
      if (result) {
        showMrzResult(result, data.text);
        return true;
      }

      scanFeedback.innerText = 'Bande MRZ non détectée...';
      return false;
    }

    /**
     * Capture manuelle : essaie d'abord la bande basse, puis le document entier
     */
    async function manualCapture() {
      if (!ocrWorker || !video.srcObject) return;
      isRecognizing = true;

      try {
        // Essai 1 : bande MRZ
        let found = await processFrame(false);
        if (found) return;

        // Essai 2 : document entier
        scanFeedback.innerText = 'Scanning document entier...';
        found = await processFrame(true);
        if (found) return;

        scanFeedback.innerText = 'Aucune MRZ détectée. Réessayez.';
      } finally {
        isRecognizing = false;
      }
    }

    // =====================================================================
    // 6. UPLOAD PHOTO
    // =====================================================================
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file || !ocrWorker) return;
      event.target.value = '';

      switchView('processing');
      const procStatus = document.getElementById('proc-status');
      procStatus.innerText = 'Chargement image...';

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = async () => {
          try {
            procStatus.innerText = 'OCR en cours...';
            const ctx = canvas.getContext('2d');

            // D'abord essayer la bande basse (MRZ)
            const cropH = Math.round(img.height * 0.35);
            const cropY = img.height - cropH;
            canvas.width = img.width;
            canvas.height = cropH;
            ctx.filter = 'contrast(2.5) grayscale(1)';
            ctx.drawImage(img, 0, cropY, img.width, cropH, 0, 0, img.width, cropH);
            ctx.filter = 'none';
            binarize(ctx, img.width, cropH);

            let dataUrl = canvas.toDataURL('image/png');
            let { data } = await ocrWorker.recognize(dataUrl);
            let result = tryAllParsingStrategies(data.text);

            if (!result) {
              // Essayer le document entier
              procStatus.innerText = 'Analyse complète...';
              canvas.width = img.width;
              canvas.height = img.height;
              ctx.filter = 'contrast(2.0) grayscale(1)';
              ctx.drawImage(img, 0, 0);
              ctx.filter = 'none';
              binarize(ctx, img.width, img.height);
              dataUrl = canvas.toDataURL('image/png');
              const res2 = await ocrWorker.recognize(dataUrl);
              data = res2.data;
              result = tryAllParsingStrategies(data.text);
            }

            if (result) {
              showMrzResult(result, data.text);
            } else {
              showRawResult(data.text, 'Aucune MRZ détectée');
            }
          } catch (err) {
            console.error(err);
            showRawResult('', 'Erreur: ' + err.message);
          }
        };
        img.onerror = () => showRawResult('', 'Image illisible');
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // =====================================================================
    // 7. BINARISATION ADAPTATIVE
    // =====================================================================
    function binarize(ctx, w, h) {
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      // Seuil adaptatif : 65% de la luminosité moyenne
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) sum += d[i];
      const threshold = (sum / (d.length / 4)) * 0.65;
      for (let i = 0; i < d.length; i += 4) {
        const v = d[i] < threshold ? 0 : 255;
        d[i] = d[i + 1] = d[i + 2] = v;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // =====================================================================
    // 8. AFFICHAGE RÉSULTAT
    // =====================================================================
    const LABELS = {
      documentType: ['📄', 'Type'],
      documentNumber: ['🔢', 'N° Document'],
      issuingState: ['🏳️', 'Pays'],
      lastName: ['👤', 'Nom'],
      firstName: ['👤', 'Prénom'],
      nationality: ['🌍', 'Nationalité'],
      birthDate: ['🎂', 'Naissance'],
      sex: ['⚧', 'Sexe'],
      expirationDate: ['📅', 'Expiration'],
      personalNumber: ['🔑', 'N° Personnel'],
      optional1: ['📋', 'Optionnel 1'],
      optional2: ['📋', 'Optionnel 2'],
    };

    function fmtDate(d) {
      if (!d || d.length !== 6) return d || '—';
      const yy = d.substring(0, 2), mm = d.substring(2, 4), dd = d.substring(4, 6);
      return dd + '.' + mm + '.' + (parseInt(yy) > 50 ? '19' : '20') + yy;
    }

    function showMrzResult(result, rawText) {
      stopCamera();

      const badge = document.getElementById('res-valid-badge');
      if (result.valid) {
        badge.className = 'valid-badge'; badge.innerText = '✅ VALIDE';
      } else if (result.format) {
        badge.className = 'warn-badge'; badge.innerText = '⚠️ PARTIEL';
      } else {
        badge.className = 'invalid-badge'; badge.innerText = '❌ ERREURS';
      }

      document.getElementById('res-format').innerText =
        'Format: ' + (result.format || '?') + (result._strategy ? ' — ' + result._strategy : '');

      const container = document.getElementById('res-fields');
      container.innerHTML = '';

      // N° document composite
      if (result.documentNumber) {
        addField(container, '🆔', 'N° Document', result.documentNumber, true);
      }

      // Champs
      if (result.fields) {
        for (const [key, val] of Object.entries(result.fields)) {
          if (val === undefined || val === null || val === '') continue;
          if (key === 'documentNumber' && result.documentNumber) continue; // déjà affiché
          const [icon, label] = LABELS[key] || ['📋', key];
          let display = val;
          if (key.toLowerCase().includes('date') && typeof display === 'string' && display.length === 6) {
            display = fmtDate(display);
          }
          addField(container, icon, label, display);
        }
      }

      // Erreurs de validation
      if (result.details) {
        const errs = result.details.filter(d => !d.valid && d.error);
        if (errs.length > 0) {
          const div = document.createElement('div');
          div.className = 'mt-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs text-red-400';
          div.innerHTML = '<b>Validation :</b><br>' + errs.map(e => '• ' + (e.label || e.field || '?') + ': ' + e.error).join('<br>');
          container.appendChild(div);
        }
      }

      document.getElementById('res-raw').innerText =
        'OCR brut:\n' + (rawText || '').substring(0, 600);

      switchView('result');
    }

    function addField(container, icon, label, value, highlight) {
      const row = document.createElement('div');
      row.className = 'field-row';
      if (highlight) { row.style.background = 'rgba(59,130,246,0.1)'; row.style.border = '1px solid rgba(59,130,246,0.2)'; }
      row.innerHTML = '<span class="text-lg">' + icon + '</span><span class="field-label">' + label +
        '</span><span class="field-value"' + (highlight ? ' style="color:#60a5fa;font-family:monospace;"' : '') + '>' + value + '</span>';
      container.appendChild(row);
    }

    function showRawResult(rawText, msg) {
      stopCamera();
      document.getElementById('res-valid-badge').className = 'invalid-badge';
      document.getElementById('res-valid-badge').innerText = '❌ ÉCHEC';
      document.getElementById('res-format').innerText = msg;
      document.getElementById('res-fields').innerHTML = '<div class="field-row"><span class="field-value text-slate-500">Aucun MRZ détecté</span></div>';
      document.getElementById('res-raw').innerText = rawText || '';
      switchView('result');
    }

    // =====================================================================
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>

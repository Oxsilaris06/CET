<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner Identité Intelligent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #fff; margin: 0; min-height: 100vh; }
    .view { display: none; }
    .view.active { display: flex; }
    
    .field-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.04); border-radius: 0.75rem; margin-bottom: 0.5rem; cursor: pointer; transition: background 0.2s; }
    .field-row:hover { background: rgba(255, 255, 255, 0.08); }
    .field-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; min-width: 6rem; }
    .field-value { font-size: 1rem; font-weight: 600; color: #f1f5f9; flex: 1; word-break: break-all; }
    
    .valid-badge { background: #22c55e22; color: #22c55e; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
    .partial-badge { background: #3b82f622; color: #3b82f6; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
    .invalid-badge { background: #ef444422; color: #ef4444; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
    
    .copy-toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #22c55e; color: #000; padding: 0.5rem 1.5rem; border-radius: 2rem; font-weight: 700; font-size: 0.8rem; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .copy-toast.show { opacity: 1; }
    
    .doc-selector { display: flex; gap: 0.5rem; width: 100%; max-width: 24rem; margin-top: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .doc-btn { flex: 1; min-width: 80px; padding: 0.6rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; font-size: 0.65rem; font-weight: 600; color: #94a3b8; text-align: center; transition: all 0.2s; white-space: nowrap; }
    .doc-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59, 131, 246, 0.3); }

    .engine-badge { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; backdrop-filter: blur(4px); }
    .engine-native { color: #4ade80; border: 1px solid #4ade8055; }
    .engine-wasm { color: #facc15; border: 1px solid #facc1555; }
    
    .progress-bar-container { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .progress-bar { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s linear; }
  </style>
</head>

<body>
  <div id="copy-toast" class="copy-toast">✅ Copié !</div>

  <!-- 1. CHARGEMENT -->
  <div id="view-loading" class="view active fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-6 animate-pulse">🔒</div>
    <h1 class="text-xl font-bold mb-2">Scanner Intelligent</h1>
    <div class="w-full max-w-xs bg-slate-800 rounded-full h-2 mt-4 overflow-hidden">
      <div id="load-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="load-status" class="text-slate-500 text-xs mt-3 font-mono">Chargement...</p>
  </div>

  <!-- 2. PRÊT -->
  <div id="view-ready" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div id="engine-indicator" class="engine-badge engine-wasm">Moteur: Détection...</div>
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🛡️</div>
      <h1 class="text-2xl font-bold mb-2">Scanner 2 Temps</h1>
      <p class="text-slate-400 text-sm">Mode optimal auto + Récupération partielle</p>
    </div>

    <div class="doc-selector mb-6" id="ready-selector">
      <button class="doc-btn active" data-type="AUTO">AUTO</button>
      <button class="doc-btn" data-type="Passeport">🛂 PASS</button>
      <button class="doc-btn" data-type="Permis de conduire">🚗 PERMIS</button>
      <button class="doc-btn" data-type="Titre de séjour">📜 SÉJOUR</button>
      <button class="doc-btn" data-type="CNI">🆔 CNI</button>
    </div>

    <button onclick="startCamera()" class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-600/20">
      Scanner le document
    </button>
    <label class="w-full max-w-sm mt-4 bg-white/5 hover:bg-white/10 py-4 rounded-xl font-bold text-lg transition-all text-center cursor-pointer block border border-white/10">
      Importer une photo
      <input type="file" id="fileUpload" accept="image/*" class="hidden" />
    </label>
  </div>

  <!-- 3. SCANNER CAMÉRA -->
  <div id="view-scanning" class="view fixed inset-0 z-50 bg-black flex flex-col">
    <video id="video-stream" class="w-full h-full object-cover" playsinline muted></video>
    
    <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
      <div class="w-[90%] max-w-[400px] aspect-[1.58/1] border-2 border-blue-500/50 rounded-xl relative overflow-hidden">
        <div class="absolute bottom-0 left-0 w-full h-[30%] bg-blue-500/20 border-t border-blue-500/50 flex items-center justify-center">
          <span class="text-blue-300/80 text-[10px] font-bold tracking-widest uppercase">Alignez la bande du bas ici</span>
        </div>
      </div>
    </div>

    <div class="absolute bottom-8 left-0 w-full px-6">
      <div class="bg-black/80 backdrop-blur-md p-4 rounded-2xl border border-slate-800 text-center">
        <p id="scan-feedback" class="text-sm font-medium text-blue-400 mb-1 animate-pulse">Temps 1 : Recherche d'une lecture parfaite...</p>
        <div class="progress-bar-container mb-3">
          <div id="timeout-progress" class="progress-bar"></div>
        </div>
        
        <div class="flex gap-2">
          <button onclick="cancelScan()" class="flex-1 bg-white/10 py-3 rounded-lg font-bold text-sm">Annuler</button>
          <button onclick="forceCapture()" class="flex-1 bg-slate-700 py-3 rounded-lg font-bold text-sm" id="btn-force">📸 Récupérer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. RÉSULTAT -->
  <div id="view-result" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col overflow-y-auto">
    <div class="px-6 py-6 flex-1">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Données Extraites</h2>
        <span id="res-valid-badge" class="valid-badge">—</span>
      </div>
      
      <div id="res-fields" class="space-y-2 mb-6"></div>

      <button onclick="copyAllFields()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg mb-4 transition-all shadow-lg shadow-blue-600/20">
        📋 TOUT COPIER
      </button>

      <details class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
        <summary class="text-xs text-slate-500 cursor-pointer">Données brutes non filtrées (Debug)</summary>
        <pre id="res-raw" class="text-[10px] font-mono text-slate-500 mt-3 whitespace-pre-wrap break-all"></pre>
      </details>
    </div>
    <div class="px-6 pb-6">
      <button onclick="resetApp()" class="w-full bg-white/10 py-4 rounded-xl font-bold text-sm">Nouveau scan</button>
    </div>
  </div>

  <canvas id="canvas-mrz" class="hidden"></canvas>

  <script>
    // =====================================================================
    // VARIABLES GLOBALES
    // =====================================================================
    const views = {};
    let video, canvas, ctx;
    let mrzParse = null;
    let scanTimeout = null;
    let ocrEngine = 'NONE'; 
    let tesseractWorker = null;
    let isScanning = false;
    let selectedDocType = 'AUTO';
    let finalFields = {};

    let bestScanResult = null;
    let bestScanScore = 0;
    let scanStartTime = 0;
    const MAX_SCAN_DURATION_MS = 8000;

    // Mots Absolument Interdits dans les Champs de données (Demande Utilisateur)
    const FORBIDDEN_WORDS = [
      'TITRE DE SEJOUR', 'CARTE NATIONALE', 'IDENTITE', 'PASSEPORT', 'PASSPORT',
      'PERMIS', 'CONDUIRE', 'DRIVING', 'LICENSE', 'REPUBLIQUE', 'FRANCAISE'
    ];

    // Mots parasites d'OCR à nettoyer dans les Noms
    const OCR_NOISE = /\b(ULOME|SURNAME|GIVEN|NAMES|SCE|NOM|PRENOM)\b/gi;

    const ALLOWED_DOC_TYPES = {
      'PASSEPORT': 'Passeport',
      'CNI': 'CNI',
      'TITRE_SEJOUR': 'Titre de séjour',
      'PERMIS_FR': 'Permis de conduire'
    };

    const FIELD_ORDER = ['Type de document', 'N° de titre', 'Nom', 'Prénom', 'Date de naissance', 'Sexe', 'Nationalité', 'Date d\'émission', 'Date de péremption'];
    
    // =====================================================================
    // FILTRES ET NETTOYEURS
    // =====================================================================
    
    function containsForbiddenWord(text) {
      if (!text) return false;
      const upper = text.toUpperCase().replace(/[^A-Z]/g, '');
      return FORBIDDEN_WORDS.some(word => upper.includes(word.replace(/[^A-Z]/g, '')));
    }

    function cleanName(name) {
      if (!name) return null;
      let clean = name.toUpperCase();
      
      // Suppression des labels OCR corrompus
      clean = clean.replace(OCR_NOISE, '');
      
      // Enlever les puces type "1.", "2.", ou les lettres isolées au début "A DUPONT"
      clean = clean.replace(/^[0-9A-Z]+[.\-:]?\s+/g, '');
      
      // Ne garder que lettres, espaces, tirets et VIRGULES
      clean = clean.replace(/[^\w\s\-À-Ÿ,]/g, '').trim();
      clean = clean.replace(/^,+|,+$/g, '').trim(); // Enlever virgules début/fin

      if (clean.length < 2) return null;
      if (containsForbiddenWord(clean)) return null;

      return clean;
    }

    // Accepte désormais "15 05 1997" avec des espaces
    function strictDateFormatter(rawDate) {
      if (!rawDate) return null;
      let dd, mm, yyyy;

      // Format MRZ AAMMJJ (ex: "900512")
      if (/^\d{6}$/.test(rawDate)) {
        let yy = parseInt(rawDate.substring(0,2));
        mm = rawDate.substring(2,4);
        dd = rawDate.substring(4,6);
        yyyy = (yy > 50 ? '19' : '20') + rawDate.substring(0,2);
      } 
      else {
        // Regex robuste tolérant les espaces ou caractères de séparation
        const match = rawDate.match(/^(\d{2})[./\-\s]+(\d{2})[./\-\s]+(\d{4})$/);
        if (match) {
            dd = match[1];
            mm = match[2];
            yyyy = match[3];
        } else {
            return null;
        }
      }

      if (parseInt(mm) < 1 || parseInt(mm) > 12) return null;
      if (parseInt(dd) < 1 || parseInt(dd) > 31) return null;
      if (parseInt(yyyy) < 1900 || parseInt(yyyy) > 2100) return null;

      return `${dd}.${mm}.${yyyy}`;
    }

    function getStrictDocType(format, rawText) {
      if (selectedDocType !== 'AUTO') return selectedDocType;
      if (format === 'TD3') return ALLOWED_DOC_TYPES.PASSEPORT;
      if (format === 'PERMIS_FR') return ALLOWED_DOC_TYPES.PERMIS_FR;
      
      const upperText = (rawText || '').toUpperCase();
      if (format === 'TD1') {
        if (upperText.includes('IRFRA') || upperText.includes('SEJOUR') || upperText.includes('RESIDENT')) return ALLOWED_DOC_TYPES.TITRE_SEJOUR;
        return ALLOWED_DOC_TYPES.CNI;
      }
      if (upperText.includes('PERMIS') && upperText.includes('CONDUIRE')) return ALLOWED_DOC_TYPES.PERMIS_FR;
      if (upperText.includes('PASSEPORT') || upperText.includes('RASSPORT')) return ALLOWED_DOC_TYPES.PASSEPORT;
      if (upperText.includes('SEJOUR')) return ALLOWED_DOC_TYPES.TITRE_SEJOUR;
      if (upperText.includes('IDENTIT')) return ALLOWED_DOC_TYPES.CNI;

      return null;
    }

    function applyStrictRules(extractedData, rawText) {
      const strictResult = {
        'Type de document': getStrictDocType(extractedData.format, rawText),
        'N° de titre': null,
        'Nom': cleanName(extractedData.fields?.lastName),
        'Prénom': cleanName(extractedData.fields?.firstName),
        'Date de naissance': strictDateFormatter(extractedData.fields?.birthDate),
        'Date d\'émission': strictDateFormatter(extractedData.fields?.issueDate),
        'Date de péremption': strictDateFormatter(extractedData.fields?.expirationDate),
        'Sexe': extractedData.fields?.sex,
        'Nationalité': extractedData.fields?.nationality
      };

      const docNum = extractedData.documentNumber;
      if (docNum && docNum.length >= 5 && !containsForbiddenWord(docNum)) {
        strictResult['N° de titre'] = docNum.toUpperCase().replace(/[^A-Z0-9]/g, '');
      }

      const isOptimal = (
        strictResult['Type de document'] !== null &&
        strictResult['N° de titre'] !== null &&
        strictResult['Nom'] !== null &&
        strictResult['Date de naissance'] !== null
      );

      let score = 0;
      Object.values(strictResult).forEach(val => { if (val !== null) score++; });

      return { isOptimal, score, strictFields: strictResult };
    }

    // =====================================================================
    // INITIALISATION & MOTEURS
    // =====================================================================
    window.addEventListener('DOMContentLoaded', async () => {
      ['loading', 'ready', 'scanning', 'result'].forEach(n => views[n] = document.getElementById('view-' + n));
      video = document.getElementById('video-stream');
      canvas = document.getElementById('canvas-mrz');
      ctx = canvas.getContext('2d', { willReadFrequently: true });
      document.getElementById('fileUpload').addEventListener('change', handleFileUpload);

      document.querySelectorAll('.doc-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedDocType = btn.getAttribute('data-type');
          document.querySelectorAll('.doc-btn').forEach(b => {
            if (b.getAttribute('data-type') === selectedDocType) b.classList.add('active');
            else b.classList.remove('active');
          });
        });
      });

      await loadEngines();
    });

    function switchView(name) {
      Object.values(views).forEach(v => { v.classList.remove('active'); v.classList.add('hidden'); });
      views[name].classList.add('active');
      views[name].classList.remove('hidden');
    }

    async function loadEngines() {
      const status = document.getElementById('load-status');
      const bar = document.getElementById('load-progress');
      try {
        status.innerText = "Chargement des modules OCR...";
        bar.style.width = '30%';
        const mod = await import('https://esm.sh/mrz@5');
        mrzParse = mod.parse;

        if ('TextDetector' in window) {
          ocrEngine = 'NATIVE';
          document.getElementById('engine-indicator').innerText = "⚡ Moteur Natif";
          document.getElementById('engine-indicator').className = "engine-badge engine-native";
          bar.style.width = '100%';
        } else {
          ocrEngine = 'TESSERACT';
          document.getElementById('engine-indicator').innerText = "🐢 Moteur Web";
          document.getElementById('engine-indicator').className = "engine-badge engine-wasm";
          bar.style.width = '60%';
          tesseractWorker = await Tesseract.createWorker('eng');
          await tesseractWorker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<', });
          bar.style.width = '100%';
        }
        setTimeout(() => switchView('ready'), 500);
      } catch (err) { status.innerText = "Erreur: " + err.message; }
    }

    // =====================================================================
    // EXTRACTION DU TEXTE & RECHERCHE AVANCÉE (Lignes Multiples)
    // =====================================================================
    async function extractTextFromImage(imageSource) {
      let srcW = imageSource === 'camera' ? video.videoWidth : imageSource.width;
      let srcH = imageSource === 'camera' ? video.videoHeight : imageSource.height;
      
      canvas.width = srcW; canvas.height = srcH;
      if (imageSource === 'camera') ctx.drawImage(video, 0, 0, srcW, srcH);
      else ctx.drawImage(imageSource, 0, 0, srcW, srcH);

      if (ocrEngine === 'NATIVE') {
        try {
          const detector = new TextDetector();
          const detectedTexts = await detector.detect(canvas);
          return detectedTexts.map(t => t.rawValue).join('\n');
        } catch (e) { return ""; }
      } else {
        ctx.filter = 'contrast(1.5) grayscale(1)';
        ctx.drawImage(canvas, 0, 0);
        ctx.filter = 'none';
        const { data } = await tesseractWorker.recognize(canvas);
        return data.text;
      }
    }

    function parseRawText(rawText) {
      if (!rawText) return {};
      let format = null, documentNumber = null, fields = {};

      // 1. TENTATIVE MRZ
      const mrzLines = rawText.toUpperCase().split('\n').map(l => l.replace(/[\s]+/g, '<').replace(/[^A-Z0-9<]/g, '').trim()).filter(l => l.length >= 25);
      if (mrzLines.length >= 2) {
        let patched = [...mrzLines];
        if (patched[0].startsWith('IR')) patched[0] = 'ID' + patched[0].substring(2);
        try { 
          const mrz = mrzParse(patched); 
          if(mrz) { format = mrz.format; documentNumber = mrz.documentNumber; fields = mrz.fields; }
        } catch (e) {}
      }

      // Permis Manuel
      const permisLine = mrzLines.find(l => /^[D0][1I]/.test(l));
      if (permisLine && !format) {
        const docNum = permisLine.substring(5, 14).replace(/</g, '');
        if (docNum.length >= 5) { format = 'PERMIS_FR'; documentNumber = docNum; fields.expirationDate = permisLine.substring(15, 21); }
      }

      // 2. EXTRACTION VISUELLE MULTI-LIGNES (Le correctif du Passeport Français)
      const visLines = rawText.toUpperCase().split('\n').map(l => l.trim()).filter(l => l.length > 0);
      
      const getValFromLineOrNext = (idx, labelRegex) => {
          let val = visLines[idx].replace(labelRegex, '').trim();
          val = val.replace(OCR_NOISE, '').replace(/^[.:-]+\s*/, '').trim();
          
          if (val.length >= 2) return val;
          
          // Si vide, on regarde la ligne en dessous
          if (idx + 1 < visLines.length) {
              let nextLine = visLines[idx + 1].trim();
              // On vérifie que la ligne du dessous n'est pas un autre titre (ex: Date de naissance)
              if (!/(NOM|PRENOM|DATE|SEXE|NATIONALITE|PASSEPORT|CARTE|TITRE)/.test(nextLine)) {
                  return nextLine.replace(/^[.:-]+\s*/, '').trim();
              }
          }
          return null;
      };

      for (let i = 0; i < visLines.length; i++) {
          let l = visLines[i];
          
          if (!fields.lastName && /(NOM|SURNAME)/i.test(l)) {
              let res = getValFromLineOrNext(i, /(NOM|SURNAME)S?/gi);
              if (res) fields.lastName = res;
          }
          
          if (!fields.firstName && /(PRENOM|GIVEN|PRÉNOM)/i.test(l)) {
              let res = getValFromLineOrNext(i, /(PRENOM|GIVEN|PRÉNOM)S?/gi);
              if (res) fields.firstName = res;
          }

          if (!documentNumber && /(PASSEPORT|CARTE|TITRE|DOCUMENT|RASSPORT)\s*N/i.test(l)) {
              let res = getValFromLineOrNext(i, /(PASSEPORT|CARTE|TITRE|DOCUMENT|RASSPORT)\s*N[°0O]?/gi);
              if (res) {
                  res = res.replace(/[^A-Z0-9]/g, '');
                  if (res.length >= 5) documentNumber = res;
              }
          }
      }

      // 3. EXTRACTION DATES GLOBALES (Gère les espaces "15 05 1997")
      const dateRegex = /\b(\d{2})[./\-\s]+(\d{2})[./\-\s]+(\d{4})\b/g;
      let match;
      while ((match = dateRegex.exec(rawText)) !== null) {
          let dString = `${match[1]}.${match[2]}.${match[3]}`;
          let index = match.index;
          let context = rawText.substring(Math.max(0, index - 30), index).toUpperCase();

          if (context.includes('NAISSANCE') && !fields.birthDate) fields.birthDate = dString;
          else if ((context.includes('DELIVR') || context.includes('EMISSION')) && !fields.issueDate) fields.issueDate = dString;
          else if ((context.includes('EXPIR') || context.includes('PEREMP') || context.includes('JUSQU')) && !fields.expirationDate) fields.expirationDate = dString;
      }

      return { format, documentNumber, fields };
    }

    // =====================================================================
    // CAMERA ET BOUCLE
    // =====================================================================
    async function startCamera() {
      switchView('scanning');
      isScanning = true;
      bestScanResult = null;
      bestScanScore = 0;
      scanStartTime = Date.now();
      
      document.getElementById('scan-feedback').innerText = "Temps 1: Recherche d'une lecture parfaite...";
      document.getElementById('timeout-progress').style.width = '0%';
      document.getElementById('btn-force').classList.add('hidden');
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = stream;
        await video.play();
        scanLoop();
      } catch (err) {
        document.getElementById('scan-feedback').innerText = "Erreur Caméra. Veuillez autoriser l'accès.";
      }
    }

    function stopVideo() {
      isScanning = false;
      if (scanTimeout) clearTimeout(scanTimeout);
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    }

    function cancelScan() { stopVideo(); switchView('ready'); }

    function forceCapture() {
      if (!isScanning) return;
      stopVideo();
      if (bestScanResult) showResult(bestScanResult.data, bestScanResult.raw, true);
      else showResult({ isOptimal: false, strictFields: {} }, "Aucune donnée lisible", true);
    }

    async function scanLoop() {
      if (!isScanning || !video.srcObject || video.paused) return;

      try {
        const rawText = await extractTextFromImage('camera');
        const rawData = parseRawText(rawText);
        const validatedData = applyStrictRules(rawData, rawText);

        if (validatedData.score > bestScanScore) {
          bestScanScore = validatedData.score;
          bestScanResult = { data: validatedData, raw: rawText };
        }

        if (validatedData.isOptimal) {
          stopVideo();
          showResult(validatedData, rawText, false);
          return;
        } 
        
        const elapsed = Date.now() - scanStartTime;
        const progress = Math.min(100, (elapsed / MAX_SCAN_DURATION_MS) * 100);
        document.getElementById('timeout-progress').style.width = `${progress}%`;

        if (bestScanScore >= 2) document.getElementById('btn-force').classList.remove('hidden');

        if (elapsed > MAX_SCAN_DURATION_MS) {
          if (bestScanResult && bestScanScore >= 1) {
             document.getElementById('scan-feedback').innerText = "Temps 2: Récupération des données...";
             stopVideo();
             showResult(bestScanResult.data, bestScanResult.raw, true);
             return;
          } else {
             scanStartTime = Date.now(); // Relance si vraiment rien
          }
        }
      } catch (e) { console.error(e); }

      const delay = ocrEngine === 'NATIVE' ? 150 : 800;
      scanTimeout = setTimeout(scanLoop, delay);
    }

    // =====================================================================
    // IMPORTATION PHOTO
    // =====================================================================
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      switchView('loading');
      document.getElementById('load-status').innerText = "Filtrage intelligent...";
      
      const img = new Image();
      img.onload = async () => {
        const rawText = await extractTextFromImage(img);
        const rawData = parseRawText(rawText);
        const validatedData = applyStrictRules(rawData, rawText);
        showResult(validatedData, rawText, !validatedData.isOptimal);
      };
      img.src = URL.createObjectURL(file);
    }

    // =====================================================================
    // AFFICHAGE
    // =====================================================================
    function resetApp() { switchView('ready'); }

    function addFieldUI(container, label, value) {
      const row = document.createElement('div');
      row.className = 'field-row';
      const icon = label.includes('Date') ? '📅' : (label === 'Nom' || label === 'Prénom' ? '👤' : (label.includes('N°') ? '🆔' : '🏳️'));
      row.innerHTML = `<span class="text-lg">${icon}</span><span class="field-label">${label}</span><span class="field-value">${value}</span>`;
      finalFields[label] = value;
      row.addEventListener('click', () => { navigator.clipboard.writeText(value).then(() => showToast(`✅ ${label} copié !`)).catch(()=>{}); });
      container.appendChild(row);
    }

    function showResult(validatedData, rawText, isPartialFallback) {
      switchView('result');
      finalFields = {}; 
      
      const badge = document.getElementById('res-valid-badge');
      if (validatedData.isOptimal) { badge.className = 'valid-badge'; badge.innerText = '✅ DONNÉES COMPLÈTES'; } 
      else if (isPartialFallback && validatedData.score > 0) { badge.className = 'partial-badge'; badge.innerText = '⚠️ DONNÉES PARTIELLES'; } 
      else { badge.className = 'invalid-badge'; badge.innerText = '❌ ÉCHEC'; }

      document.getElementById('res-raw').innerText = rawText || "Aucun texte détecté";
      const container = document.getElementById('res-fields');
      container.innerHTML = '';

      let hasDisplayedData = false;
      if (validatedData.strictFields) {
        FIELD_ORDER.forEach(label => {
          const value = validatedData.strictFields[label];
          if (value !== null && value !== undefined) {
            hasDisplayedData = true;
            addFieldUI(container, label, value);
          }
        });
      }

      if (!hasDisplayedData) container.innerHTML = `<p class="text-sm text-red-400 text-center py-4 font-bold">Aucune donnée valide trouvée.</p>`;
    }

    function copyAllFields() {
      if (Object.keys(finalFields).length === 0) return;
      const text = Object.entries(finalFields).map(([label, value]) => `${label} : ${value}`).join('\n');
      navigator.clipboard.writeText(text).then(() => showToast('✅ Copie réussie !')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        showToast('✅ Copie réussie !');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('copy-toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }
  </script>
</body>
</html>

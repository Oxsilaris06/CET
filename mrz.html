<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner MRZ — Praxis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #fff;
      margin: 0;
      min-height: 100vh;
    }

    .view {
      display: none;
    }

    .view.active {
      display: flex;
    }

    #video-stream {
      transform: scaleX(1);
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .field-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #94a3b8;
      min-width: 3rem;
    }

    .field-value {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      flex: 1;
    }

    .valid-badge {
      background: #22c55e22;
      color: #22c55e;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .invalid-badge {
      background: #ef444422;
      color: #ef4444;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- 1. CHARGEMENT -->
  <div id="view-loading"
    class="view active fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-5xl mb-6">🛂</div>
    <h1 class="text-xl font-bold mb-2">Scanner MRZ</h1>
    <p class="text-slate-500 text-sm mb-6 text-center">Chargement du moteur OCR OCRB...</p>
    <div class="w-full max-w-xs bg-slate-800 rounded-full h-2 overflow-hidden">
      <div id="load-progress" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
    <p id="load-status" class="text-slate-600 text-xs mt-3 font-mono">Initialisation...</p>
  </div>

  <!-- 2. PRÊT -->
  <div id="view-ready" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col items-center justify-center px-8">
    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🛂</div>
      <h1 class="text-2xl font-bold mb-2">Scanner MRZ</h1>
      <p class="text-slate-400 text-sm">Passeport · CNI · Permis · Titre de séjour</p>
      <p class="text-slate-600 text-xs mt-2">Moteur OCRB + Parser ICAO 9303</p>
    </div>
    <button onclick="startCamera()"
      class="w-full max-w-sm bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all">
      📷 Scanner avec la caméra
    </button>
    <label
      class="w-full max-w-sm mt-3 bg-white/10 hover:bg-white/15 py-4 rounded-xl font-bold text-lg transition-all text-center cursor-pointer block">
      📁 Importer une photo
      <input type="file" accept="image/*" capture="environment" onchange="handleFileUpload(event)" class="hidden" />
    </label>
    <a href="1.html" class="mt-6 text-slate-500 hover:text-slate-300 text-sm flex items-center gap-1 transition-colors">
      ← Retour
    </a>
  </div>

  <!-- 3. SCANNER CAMÉRA -->
  <div id="view-scanning" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
    <video id="video-stream" class="w-full h-full object-cover" playsinline muted></video>

    <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
      <div
        class="w-[90%] max-w-[500px] h-[120px] border-2 border-dashed border-blue-400 rounded-xl shadow-[0_0_0_9999px_rgba(0,0,0,0.7)] relative"
        style="margin-top: 30vh;">
        <div class="absolute inset-0 bg-blue-400/5 animate-pulse rounded-xl"></div>
        <div
          class="absolute -top-8 left-0 w-full text-center text-blue-400 font-bold text-xs tracking-widest uppercase">
          Cadrez la bande MRZ ici ↓
        </div>
      </div>
    </div>

    <div class="absolute bottom-6 left-0 w-full px-6 space-y-3">
      <div class="bg-slate-900/90 backdrop-blur-xl p-4 rounded-2xl border border-slate-800">
        <p id="scan-feedback" class="text-sm font-medium text-center">Démarrage...</p>
        <p id="scan-debug" class="text-[10px] font-mono text-slate-600 mt-1 text-center truncate"></p>
      </div>
      <button onclick="cancelScan()"
        class="w-full bg-white/10 backdrop-blur-md py-3.5 rounded-xl font-bold border border-white/10 text-sm">
        Annuler
      </button>
    </div>
  </div>

  <!-- 4. RÉSULTAT -->
  <div id="view-result" class="view fixed inset-0 z-50 bg-[#0a0a0f] flex flex-col overflow-y-auto">
    <div class="px-6 py-8 flex-1">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Résultat MRZ</h2>
        <span id="res-valid-badge" class="valid-badge">—</span>
      </div>

      <div id="res-format" class="text-xs text-slate-500 font-mono mb-4">—</div>

      <div id="res-fields" class="space-y-2 mb-6">
        <!-- Les champs seront générés dynamiquement -->
      </div>

      <details class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
        <summary class="text-xs text-slate-500 cursor-pointer">Données MRZ brutes</summary>
        <pre id="res-raw" class="text-[11px] font-mono text-slate-400 mt-3 whitespace-pre-wrap break-all"></pre>
      </details>
    </div>
    <div class="px-6 pb-8">
      <button onclick="resetApp()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">
        Nouveau scan
      </button>
    </div>
  </div>

  <canvas id="canvas-mrz" class="hidden"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    // =========================================================================
    // MRZ SCANNER v4 — OCRB Engine + mrz parser ICAO 9303
    // Basé sur uwolfer/mrz-scanner, adapté pour caméra live + vanilla HTML
    // =========================================================================

    // --- ÉTAT ---
    let ocrWorker = null;
    let inferenceTimeout = null;
    let isRecognizing = false;
    let mrzParser = null; // Le module mrz chargé dynamiquement

    // --- ÉLÉMENTS DOM ---
    const views = {
      loading: document.getElementById('view-loading'),
      ready: document.getElementById('view-ready'),
      scanning: document.getElementById('view-scanning'),
      result: document.getElementById('view-result'),
    };
    const video = document.getElementById('video-stream');
    const canvas = document.getElementById('canvas-mrz');
    const scanFeedback = document.getElementById('scan-feedback');
    const loadProgress = document.getElementById('load-progress');
    const loadStatus = document.getElementById('load-status');

    function switchView(name) {
      Object.values(views).forEach(v => { v.classList.remove('active'); v.classList.add('hidden'); });
      views[name].classList.add('active');
      views[name].classList.remove('hidden');
    }

    // --- 1. CHARGEMENT : Tesseract OCRB + mrz parser ---
    async function loadEngine() {
      try {
        // Étape 1 : Charger le module mrz parser via esm.sh
        loadStatus.innerText = 'Chargement du parser MRZ...';
        loadProgress.style.width = '10%';

        // Charger le parser mrz via import() dynamique depuis esm.sh
        const mrzModule = await import('https://esm.sh/mrz@4');
        mrzParser = mrzModule.parse;
        console.log('✅ mrz parser chargé');

        loadProgress.style.width = '30%';
        loadStatus.innerText = 'Chargement du moteur OCR (OCRB)...';

        // Étape 2 : Créer le worker Tesseract.js v5 avec les données OCRB
        // On utilise les données OCRB entraînées sur la police MRZ OCR-B
        ocrWorker = await Tesseract.createWorker('ocrb', 1, {
          workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
          corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
          langPath: 'https://raw.githubusercontent.com/Shreeshrii/tessdata_ocrb/main/',
          logger: (m) => {
            if (m.progress !== undefined) {
              const pct = 30 + Math.round(m.progress * 60);
              loadProgress.style.width = pct + '%';
              loadStatus.innerText = m.status || 'Chargement...';
            }
          }
        });

        // Configuration uwolfer : désactiver TOUS les dictionnaires,
        // la MRZ n'est PAS de l'anglais. PSM 6 = bloc uniforme de texte.
        await ocrWorker.setParameters({
          tessedit_pageseg_mode: '6',
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<',
          load_system_dawg: 'F',
          load_freq_dawg: 'F',
          load_unambig_dawg: 'F',
          load_punc_dawg: 'F',
          load_number_dawg: 'F',
          load_fixed_length_dawgs: 'F',
          load_bigram_dawg: 'F',
          wordrec_enable_assoc: 'F',
        });

        loadProgress.style.width = '100%';
        loadStatus.innerText = 'Prêt !';
        console.log('✅ Tesseract OCRB prêt');

        setTimeout(() => switchView('ready'), 500);
      } catch (err) {
        console.error('Erreur chargement:', err);
        loadStatus.innerText = 'Erreur: ' + err.message;
      }
    }

    window.addEventListener('DOMContentLoaded', loadEngine);

    // --- 2. GESTION CAMÉRA ---
    async function startCamera() {
      switchView('scanning');
      scanFeedback.innerText = 'Démarrage caméra...';
      isRecognizing = false;

      const constraints = {
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();
        scanFeedback.innerText = 'Caméra active — cadrez la bande MRZ';
        inferenceLoop();
      } catch (err) {
        scanFeedback.innerText = 'Erreur caméra: ' + err.message;
      }
    }

    function stopCamera() {
      if (inferenceTimeout) clearTimeout(inferenceTimeout);
      inferenceTimeout = null;
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
    }

    function cancelScan() {
      stopCamera();
      switchView('ready');
    }

    function resetApp() {
      switchView('ready');
    }

    // --- 3. BOUCLE D'INFÉRENCE CAMÉRA ---
    async function inferenceLoop() {
      if (!video.srcObject || video.paused || video.ended) return;

      if (!isRecognizing && ocrWorker) {
        isRecognizing = true;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Capturer la zone MRZ (bande inférieure du cadre vidéo)
        // La MRZ est toujours en bas du document
        const captureW = video.videoWidth * 0.9;
        const captureH = video.videoHeight * 0.25; // Bande basse = 25% de la hauteur
        const startX = (video.videoWidth - captureW) / 2;
        const startY = video.videoHeight * 0.65; // Commence à 65% de la hauteur

        canvas.width = captureW;
        canvas.height = captureH;

        // Prétraitement : haut contraste + niveaux de gris + binarisation
        ctx.filter = 'contrast(2.0) grayscale(1)';
        ctx.drawImage(video, startX, startY, captureW, captureH, 0, 0, captureW, captureH);
        ctx.filter = 'none';

        // Binarisation Otsu manuelle pour améliorer la lisibilité
        binarize(ctx, captureW, captureH);

        const dataUrl = canvas.toDataURL('image/png');

        try {
          scanFeedback.innerText = 'Analyse MRZ...';
          const { data } = await ocrWorker.recognize(dataUrl);

          // Extraire les lignes MRZ candidates
          const mrzLines = extractMrzLines(data);
          const debugEl = document.getElementById('scan-debug');

          if (mrzLines.length >= 1) {
            if (debugEl) debugEl.innerText = mrzLines.join(' | ');

            // Tenter le parsing ICAO via mrz.parse()
            try {
              const result = mrzParser(mrzLines);
              console.log('MRZ parsed:', result);

              if (result) {
                showMrzResult(result, mrzLines);
                return; // Arrêter la boucle
              }
            } catch (parseErr) {
              // Le parser mrz signale un problème — continuer à scanner
              if (debugEl) debugEl.innerText = 'Parse: ' + parseErr.message;
            }
          } else {
            if (debugEl) debugEl.innerText = 'Aucune ligne MRZ détectée';
          }

        } catch (e) {
          console.error('OCR error:', e);
        } finally {
          isRecognizing = false;
        }
      }

      inferenceTimeout = setTimeout(inferenceLoop, 1200);
    }

    // --- 4. UPLOAD FICHIER ---
    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file || !ocrWorker) return;

      switchView('scanning');
      scanFeedback.innerText = 'Analyse de l\'image...';

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const img = new Image();
          img.onload = async () => {
            // Dessiner l'image complète sur le canvas
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.filter = 'contrast(1.8) grayscale(1)';
            ctx.drawImage(img, 0, 0);
            ctx.filter = 'none';
            binarize(ctx, img.width, img.height);

            const dataUrl = canvas.toDataURL('image/png');
            scanFeedback.innerText = 'OCR en cours...';

            const { data } = await ocrWorker.recognize(dataUrl);
            const mrzLines = extractMrzLines(data);

            if (mrzLines.length >= 1) {
              try {
                const result = mrzParser(mrzLines);
                showMrzResult(result, mrzLines);
                return;
              } catch (parseErr) {
                // Afficher le texte brut en fallback
                showRawResult(data.text, parseErr.message);
                return;
              }
            }

            showRawResult(data.text, 'Aucune ligne MRZ trouvée');
          };
          img.src = e.target.result;
        } catch (err) {
          scanFeedback.innerText = 'Erreur: ' + err.message;
        }
      };
      reader.readAsDataURL(file);
    }

    // --- 5. EXTRACTION LIGNES MRZ ---
    /**
     * Extrait les lignes MRZ depuis le résultat Tesseract.
     * Utilise la méthode uwolfer : filtre par << et longueur 28-44.
     */
    function extractMrzLines(data) {
      // Méthode 1 : Utiliser data.lines de Tesseract (plus fiable)
      if (data.lines && data.lines.length > 0) {
        const candidates = data.lines
          .map(line => line.text.replace(/\s/g, '').toUpperCase())
          .filter(text => text.length >= 28 && text.length <= 46)
          .filter(text => /^[A-Z0-9<]+$/.test(text))
          .filter(text => text.includes('<<') || text.startsWith('P<') || text.startsWith('I<') || text.startsWith('ID') || text.startsWith('D1'));

        if (candidates.length >= 1) return candidates;
      }

      // Méthode 2 : Fallback sur le texte brut
      const rawLines = (data.text || '').split('\n');
      return rawLines
        .map(l => l.replace(/[\s.,_\-;:|!`'"~^]+/g, '<').replace(/[^A-Z0-9<]/gi, '').toUpperCase())
        .filter(text => text.length >= 28 && text.length <= 46)
        .filter(text => text.includes('<<') || text.match(/^[PID][A-Z<]/));
    }

    // --- 6. BINARISATION (Otsu-like) ---
    function binarize(ctx, w, h) {
      const imageData = ctx.getImageData(0, 0, w, h);
      const d = imageData.data;

      // Calculer le seuil moyen
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) {
        sum += d[i]; // Canal rouge (déjà en niveaux de gris)
      }
      const threshold = sum / (d.length / 4) * 0.7; // 70% de la moyenne → plus sombre = texte

      for (let i = 0; i < d.length; i += 4) {
        const v = d[i] < threshold ? 0 : 255;
        d[i] = v; d[i + 1] = v; d[i + 2] = v;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // --- 7. AFFICHAGE RÉSULTAT ---

    // Mappage des champs mrz vers des labels français
    const FIELD_LABELS = {
      documentType: { icon: '📄', label: 'Type', field: '—' },
      documentNumber: { icon: '🔢', label: 'N° Document', field: '5.' },
      issuingState: { icon: '🏳️', label: 'Pays', field: '—' },
      lastName: { icon: '👤', label: 'Nom', field: '1.' },
      firstName: { icon: '👤', label: 'Prénom', field: '2.' },
      nationality: { icon: '🌍', label: 'Nationalité', field: '—' },
      birthDate: { icon: '🎂', label: 'Date de naissance', field: '3.' },
      sex: { icon: '⚧', label: 'Sexe', field: '—' },
      expirationDate: { icon: '📅', label: 'Date d\'expiration', field: '4b.' },
      personalNumber: { icon: '🔑', label: 'N° Personnel', field: '—' },
    };

    function formatDate(dateStr) {
      if (!dateStr || dateStr.length !== 6) return dateStr || '—';
      const yy = dateStr.substring(0, 2);
      const mm = dateStr.substring(2, 4);
      const dd = dateStr.substring(4, 6);
      const century = parseInt(yy) > 50 ? '19' : '20';
      return dd + '.' + mm + '.' + century + yy;
    }

    function showMrzResult(result, mrzLines) {
      stopCamera();

      // Badge de validité
      const badge = document.getElementById('res-valid-badge');
      if (result.valid) {
        badge.className = 'valid-badge';
        badge.innerText = '✅ VALIDE';
      } else {
        badge.className = 'invalid-badge';
        badge.innerText = '⚠️ ERREURS';
      }

      // Format
      document.getElementById('res-format').innerText = 'Format: ' + (result.format || '?');

      // Champs
      const fieldsContainer = document.getElementById('res-fields');
      fieldsContainer.innerHTML = '';

      if (result.fields) {
        for (const [key, value] of Object.entries(result.fields)) {
          const meta = FIELD_LABELS[key] || { icon: '📋', label: key, field: '—' };
          let displayValue = value || '—';

          // Formater les dates
          if (key.toLowerCase().includes('date') && displayValue.length === 6) {
            displayValue = formatDate(displayValue);
          }

          const row = document.createElement('div');
          row.className = 'field-row';
          row.innerHTML = `
            <span class="text-lg">${meta.icon}</span>
            <span class="field-label">${meta.field !== '—' ? meta.field + ' ' : ''}${meta.label}</span>
            <span class="field-value">${displayValue}</span>
          `;
          fieldsContainer.appendChild(row);
        }
      }

      // Afficher le N° document composite si disponible
      if (result.documentNumber) {
        const row = document.createElement('div');
        row.className = 'field-row';
        row.style.background = 'rgba(59, 130, 246, 0.1)';
        row.style.border = '1px solid rgba(59, 130, 246, 0.2)';
        row.innerHTML = `
          <span class="text-lg">🆔</span>
          <span class="field-label">N° Complet</span>
          <span class="field-value" style="color: #60a5fa; font-family: monospace;">${result.documentNumber}</span>
        `;
        fieldsContainer.prepend(row);
      }

      // Détails de validation
      if (result.details && result.details.length > 0) {
        const invalidDetails = result.details.filter(d => !d.valid && d.error);
        if (invalidDetails.length > 0) {
          const errDiv = document.createElement('div');
          errDiv.className = 'mt-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs text-red-400';
          errDiv.innerHTML = '<strong>Erreurs de validation :</strong><br>' +
            invalidDetails.map(d => '• ' + (d.label || d.field) + ': ' + d.error).join('<br>');
          fieldsContainer.appendChild(errDiv);
        }
      }

      // Données brutes
      document.getElementById('res-raw').innerText = mrzLines.join('\n');

      switchView('result');
    }

    function showRawResult(rawText, errorMessage) {
      stopCamera();
      document.getElementById('res-valid-badge').className = 'invalid-badge';
      document.getElementById('res-valid-badge').innerText = '❌ NON DÉTECTÉ';
      document.getElementById('res-format').innerText = errorMessage;

      const fieldsContainer = document.getElementById('res-fields');
      fieldsContainer.innerHTML = '<div class="field-row"><span class="field-value text-slate-500">Aucun MRZ détecté dans l\'image</span></div>';

      document.getElementById('res-raw').innerText = rawText;
      switchView('result');
    }

  </script>
</body>

</html>

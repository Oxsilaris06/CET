<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATRACDVR Autonome</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" href="assets/favicon.ico" sizes="any" type="image/png">
    <link rel="icon" href="assets/favicon.ico" type="image/svg+xml">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <style>
        /* --- VARIABLES & THEME TACTICAL GLASS --- */
        :root {
            --bg-body: #050505;
            --bg-glass: rgba(22, 22, 25, 0.7);
            --bg-glass-heavy: rgba(15, 15, 20, 0.95);
            --bg-input: rgba(0, 0, 0, 0.4);
            --bg-element: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);

            --font-ui: 'Oswald', sans-serif;
            --font-title: 'Saira Stencil One', cursive;

            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #e0e0e0;
            --text-secondary: #94a3b8;

            --danger-red: #ef4444;
            --success-green: #22c55e;
            --trash-color: #6c757d;

            --radius-md: 12px;
            --radius-sm: 6px;
        }

        /* --- LAYOUT GLOBAL --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-body);
            color: var(--text-primary);
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: auto;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 25px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            padding-bottom: 80px;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 2.2em;
            color: var(--accent-blue);
            text-align: center;
            text-shadow: 0 0 20px var(--accent-glow);
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        h4 {
            font-size: 1.1em;
            color: var(--text-secondary);
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: normal;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 5px;
        }

        /* --- BOUTONS --- */
        button {
            font-family: var(--font-ui);
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        button.add-btn {
            background-color: var(--bg-element);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            border-radius: 4px;
            padding: 8px 12px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.add-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-blue);
        }

        button.remove-btn {
            background-color: transparent;
            color: var(--danger-red);
            padding: 5px;
            font-size: 1.2em;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px dashed var(--border-glass);
            border-radius: 5px;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
        }

        #generatePdfBtn {
            background-color: var(--accent-blue);
            color: white;
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #generatePdfBtn:hover {
            background-color: var(--accent-hover);
        }

        /* --- PATRACDVR & DRAG-DROP --- */
        #patracdvr_container,
        #unassigned_members_container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            min-height: 70px;
            border: 1px dashed var(--border-glass);
            border-radius: var(--radius-sm);
            align-content: flex-start;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 10px;
            transition: border-color 0.2s;
        }

        .draggable {
            cursor: grab;
            user-select: none;
        }

        .draggable.dragging {
            opacity: 0.5;
            cursor: grabbing;
            border: 1px dashed var(--accent-blue);
        }

        /* Lignes Véhicules */
        .patracdvr-vehicle-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            padding: 10px;
            padding-top: 40px;
            margin-bottom: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            min-width: 160px;
            width: auto;
            flex-grow: 1;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 8px;
        }

        .vehicle-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-name {
            color: var(--accent-blue);
            font-weight: bold;
            font-family: var(--font-ui);
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .patracdvr-members-container {
            min-height: 60px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px dashed var(--border-glass);
            border-radius: 4px;
            padding: 5px;
            align-content: flex-start;
        }

        /* Boutons Membres */
        .patracdvr-member-btn {
            background: var(--bg-glass-heavy);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 4px;
            min-height: 56px;
            min-width: 90px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
        }

        .patracdvr-member-btn:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .patracdvr-member-btn.member-active {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-glow);
            color: white;
            background: var(--accent-blue);
        }

        .patracdvr-member-btn .trigramme {
            font-weight: bold;
            font-family: var(--font-title);
            letter-spacing: 1px;
            font-size: 1.2em;
        }

        .patracdvr-member-btn .fonction {
            font-size: 0.75em;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }

        .patracdvr-member-btn.member-active .fonction {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Corbeille */
        #trashCan {
            margin-top: 20px;
            padding: 20px;
            border: 3px dashed var(--trash-color);
            border-radius: 10px;
            text-align: center;
            color: var(--trash-color);
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            font-weight: bold;
        }

        #trashCan.drag-over {
            border-color: var(--danger-red);
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
        }

        #trashCan .material-symbols-outlined {
            font-size: 40px;
            margin-bottom: 5px;
        }

        /* --- NEW MEMBER EDIT MODAL & TABS --- */
        #memberEditModal,
        #newMemberModal {
            max-width: 600px;
            width: 95%;
            padding: 0;
            overflow: hidden;
            display: none;
            /* Controlled by JS showModal() */
            flex-direction: column;
        }

        #memberEditModal[open],
        #newMemberModal[open] {
            display: flex;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--border-glass);
        }

        .modal-header h3 {
            margin: 0;
            padding: 0;
            border: none;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 70vh;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            border-bottom: 1px solid var(--border-glass);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* Steppers (Identity Tab) */
        .stepper-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            padding: 10px;
            margin-bottom: 15px;
        }

        .stepper-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            text-transform: uppercase;
            width: 80px;
        }

        .stepper-controls {
            display: flex;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
            gap: 10px;
        }

        .stepper-btn {
            background: transparent;
            color: var(--accent-blue);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stepper-value-container {
            flex: 1;
            text-align: center;
        }

        .stepper-value {
            color: white;
            font-weight: bold;
            font-size: 0.95em;
        }

        /* Weapon Selector (Weapons Tab) */
        .weapon-category {
            margin-bottom: 20px;
        }

        .weapon-category-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .weapon-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
        }

        .weapon-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .weapon-scroll::-webkit-scrollbar-thumb {
            background: var(--border-glass);
            border-radius: 3px;
        }

        .weapon-item {
            min-width: 80px;
            height: 80px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .weapon-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-blue);
        }

        .weapon-icon-container {
            width: 40px;
            height: 40px;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .weapon-icon-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: brightness(0) invert(0.6);
            /* Equivalent to text-secondary */
        }

        .weapon-item.selected .weapon-icon-container img {
            filter: brightness(0) invert(1);
            /* White for selected */
        }

        /* Fallback SVG logic for missing images handled in JS via innerHTML */

        .weapon-name {
            color: var(--text-secondary);
            font-size: 0.75em;
            font-weight: bold;
            text-align: center;
        }

        .weapon-item.selected .weapon-name {
            color: white;
            text-shadow: 0 0 8px var(--accent-blue);
        }

        .weapon-item.selected::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-blue);
            opacity: 0.1;
            z-index: 0;
        }

        .weapon-item * {
            z-index: 1;
        }

        /* Gear Grid (Multi-select) */
        .gear-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .gear-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            font-family: var(--font-ui);
        }

        .gear-btn.selected {
            background: var(--accent-blue);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 5px var(--accent-glow);
        }

        input[type="text"],
        input[type="time"] {
            background: var(--bg-input);
            border: 1px solid var(--border-glass);
            border-radius: 4px;
            padding: 8px;
            color: white;
            font-family: var(--font-ui);
        }

        input[type="text"]:focus,
        input[type="time"]:focus {
            border-color: var(--accent-blue);
        }

        /* Mission Inputs Area */
        .mission-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-element);
            border: 1px solid var(--border-glass);
            border-radius: 5px;
        }

        .mission-input-group {
            flex-grow: 1;
            min-width: 200px;
        }

        .mission-input-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .mission-input-group input {
            width: 100%;
        }


        /* --- DIALOG / MODAL --- */
        dialog {
            background: var(--bg-glass-heavy);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            margin: auto;
            max-width: 500px;
            width: 90%;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        dialog h3 {
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-family: var(--font-title);
        }

        .modal-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-form .full-width {
            grid-column: 1 / -1;
        }

        .modal-form label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
        }

        .modal-form select,
        .modal-form input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-glass);
            border-radius: 4px;
            padding: 10px;
            color: white;
            font-family: var(--font-ui);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid var(--border-glass);
            padding-top: 15px;
        }


        /* Configuration Buttons */
        #vehicle_creation_buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px dashed var(--border-glass);
            border-radius: 5px;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8em;
            border-top: 1px solid var(--border-glass);
            padding-top: 10px;
        }

        @media (max-width: 767px) {
            .container {
                padding: 10px;
            }

            h1 {
                font-size: 1.8em;
            }

            .patracdvr-vehicle-row {
                min-width: 100%;
            }

            .quick-edit-content {
                grid-template-columns: 1fr;
            }

            .modal-form {
                grid-template-columns: 1fr;
            }
        }

        /* --- CONFIGURATION COLLAPSIBLE (MERGED FROM paramOI) --- */
        .collapsible {
            background-color: var(--bg-element);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            margin-top: 20px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .collapsible-header {
            cursor: pointer;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .collapsible-header h4 {
            border: none;
            padding: 0;
            margin: 0;
            color: var(--accent-blue);
            font-family: var(--font-ui);
            font-weight: bold;
        }

        .collapsible-header .toggle-arrow {
            font-size: 1.2em;
            transition: transform 0.3s;
            color: var(--text-secondary);
        }

        .collapsible-content {
            padding: 0 15px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
        }

        .collapsible.open {
            border-color: var(--accent-blue);
        }

        .collapsible.open .collapsible-header .toggle-arrow {
            transform: rotate(180deg);
            color: var(--accent-blue);
        }

        .collapsible.open .collapsible-content {
            max-height: 5000px;
            padding-bottom: 15px;
            padding-top: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            background-color: var(--bg-input);
            color: var(--text-primary);
            font-family: var(--font-ui);
            transition: all 0.2s;
            min-height: 80px;
            resize: vertical;
        }

        .form-group textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .form-group .help-text {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>PATRACDVR </h1>

        <!-- ACTION BAR -->
        <div class="action-bar">
            <button type="button" id="resetBtn" class="add-btn remove-btn" title="Tout Effacer"
                style="color: var(--trash-color); border: 1px solid var(--trash-color);">
                <span class="material-symbols-outlined">delete_forever</span> RAZ
            </button>
            <div style="display:flex; gap:10px; flex-wrap: wrap;">
                <button type="button" id="importDefaultConfigBtn" class="add-btn" title="Config par défaut">
                    <span class="material-symbols-outlined">settings_suggest</span> Defaut (PSIG)
                </button>
                <button type="button" id="importSessionBtn" class="add-btn" title="Importer une sauvegarde JSON">
                    <span class="material-symbols-outlined">upload_file</span> Importer Sauvegarde
                </button>
                <input type="file" id="importFileInput" accept=".json" style="display: none;">
                <button type="button" id="exportSessionBtn" class="add-btn" title="Sauvegarder Session">
                    <span class="material-symbols-outlined">save</span>
                </button>
                <button type="button" id="syncWithOiBtn" class="add-btn" title="Envoyer à l'OI"
                    style="background-color: var(--success-green); border-color: var(--success-green); color: white;">
                    <span class="material-symbols-outlined">sync</span> Sync vers OI
                </button>
            </div>
        </div>

        <!-- MISSION INFO AREA -->
        <div class="mission-inputs">
            <div class="mission-input-group">
                <label for="missionTitleInput">Titre de la mission</label>
                <input type="text" id="missionTitleInput" placeholder="Ex: OP JUD X">
            </div>
            <div class="mission-input-group">
                <label for="rallyTimeInput">Heure de rassemblement</label>
                <input type="text" id="rallyTimeInput" placeholder="Ex: 06:00">
            </div>
        </div>

        <!-- MODALE EDITION MEMBRE -->
        <dialog id="memberEditModal">
            <div class="modal-header">
                <h3>ÉDITION : <span id="selectedMemberTrigramme"></span></h3>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="quick_edit_trigramme_input" placeholder="Trigramme"
                        style="max-width: 100px; padding: 5px; font-size: 0.9em;">
                    <button type="button" id="closeMemberEdit" class="remove-btn" style="padding: 5px;"><span
                            class="material-symbols-outlined">close</span></button>
                </div>
            </div>

            <!-- TABS -->
            <div class="tabs-container">
                <button type="button" class="tab-btn active" data-tab="identity">Identité</button>
                <button type="button" class="tab-btn" data-tab="weapons">Armement</button>
                <button type="button" class="tab-btn" data-tab="gear">Équipement</button>
            </div>

            <div class="modal-body">
                <!-- TAB 1: IDENTITY -->
                <div id="tab_identity" class="tab-content active">
                    <!-- Injection via JS (steppers) -->
                </div>

                <!-- TAB 2: WEAPONS -->
                <div id="tab_weapons" class="tab-content">
                    <!-- Injection via JS (weapon selectors) -->
                </div>

                <!-- TAB 3: GEAR -->

                style="color: var(--text-secondary);">Annuler</button>
            <button type="button" class="add-btn" id="confirmNewMemberBtn"
                style="background-color: var(--success-green); border-color: var(--success-green);">Ajouter
                l'opérateur</button>

    <!-- LIBRAIRIE PDF -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script>
        // --- CONFIGURATION ---
        const DEFAULT_MEMBER_CONFIG = {
            fonctions: ["Chef inter", "Chef dispo", "Chef Oscar", "Conducteur", "Chef de bord", "DE", "Cyno", "Inter", "Effrac", "AO", "Sans"],
            cellules: ["AO1", "AO2", "AO3", "AO4", "AO5", "AO6", "AO7", "AO8", "India 1", "India 2", "India 3", "India 4", "India 5", "Effrac", "Sans"],
            principales: ["UMP9", "G36", "FAP", "Sans"],
            afis: ["PIE", "LBD40", "LBD44", "Sans"],
            secondaires: ["SP2022", "G26", "Sans"],
            grenades: ["GENL", "MP7", "Sans"],
            equipements: ["Sans", "Casque Lourd", "Casque MO", "BBAL", "Bouclier MO", "Belier", "Lacry", "IL", "Lot 5.11", "HDR 50", "OP71"],
            equipements2: ["Sans", "Cam pieton", "Échelle", "Stop stick", "Lacry", "Cale", "IL", "Pass"],
            tenues: ["UBAS", "4S", "Bleu", "Civile", "Ghillie", "Treillis"],
            gpbs: ["GPBL", "GPBPD", "Casque Lourd", "Casque MO", "Sans"]
        };

        // Configuration active (copie modifiable des défauts)
        let memberConfig = JSON.parse(JSON.stringify(DEFAULT_MEMBER_CONFIG));

        const availableVehicles = ['Sharan', 'Kodiaq', 'Kodiaq Bana', '5008'];

        // MAPPING pour l'interface (Modal & QuickEdit)
        const attributeMapping = {
            'Fonction': { key: 'fonctions', attribute: 'fonction' },
            'Cellule': { key: 'cellules', attribute: 'cellule' },
            'Arme P.': { key: 'principales', attribute: 'principales' },
            'Arme S.': { key: 'secondaires', attribute: 'secondaires' },
            'A.F.I.': { key: 'afis', attribute: 'afis' },
            'Grenades': { key: 'grenades', attribute: 'grenades' },
            'Équip. 1': { key: 'equipements', attribute: 'equipement' },
            'Équip. 2': { key: 'equipements2', attribute: 'equipement2' },
            'Tenue': { key: 'tenues', attribute: 'tenue' },
            'GPB': { key: 'gpbs', attribute: 'gpb' }
        };

        const multiSelectAttributes = ['fonction', 'cellule', 'equipement', 'equipement2', 'afis', 'gpb', 'grenades'];

        // --- STATE ---
        let activeMemberId = null;
        let draggedItem = null;
        let tempNewMemberData = {};
        const patracdvrContainer = document.getElementById('patracdvr_container');
        const unassignedContainer = document.getElementById('unassigned_members_container');
        const memberEditModal = document.getElementById('memberEditModal');
        const newMemberModal = document.getElementById('newMemberModal');

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            setupVehicleButtons();
            setupCollapsibles(); // Init collapsibles
            loadData();
            setupTabs(); // Init tabs for Member Edit Modal

            // Event Listeners globaux
            document.getElementById('addManualVehicleBtn').addEventListener('click', addManualVehicle);

            // Bouton "Créer membre" ouvre la modale
            document.getElementById('addManualMemberBtn').addEventListener('click', openNewMemberModal);
            document.getElementById('cancelNewMemberBtn').addEventListener('click', () => newMemberModal.close());
            document.getElementById('cancelNewMemberBtnTop').addEventListener('click', () => newMemberModal.close());
            document.getElementById('confirmNewMemberBtn').addEventListener('click', addNewMemberFromModal);
            document.getElementById('new_trigramme').addEventListener('input', (e) => {
                document.getElementById('newMemberTrigrammeDisplay').textContent = e.target.value.toUpperCase() || 'Nouveau';
            });

            document.getElementById('resetBtn').addEventListener('click', resetAll);
            document.getElementById('importDefaultConfigBtn').addEventListener('click', loadDefaultConfig);
            document.getElementById('exportSessionBtn').addEventListener('click', exportData);
            document.getElementById('importSessionBtn').addEventListener('click', () => document.getElementById('importFileInput').click());
            document.getElementById('importFileInput').addEventListener('change', importData);
            document.getElementById('syncWithOiBtn').addEventListener('click', syncWithOI);

            document.getElementById('closeMemberEdit').addEventListener('click', closeMemberEditModal);
            document.getElementById('saveMemberEditBtn').addEventListener('click', closeMemberEditModal);
            document.getElementById('deleteMemberBtn').addEventListener('click', deleteActiveMember);

            document.getElementById('generatePdfBtn').addEventListener('click', generatePatracdvrPdf);

            // Listeners pour sauvegarde auto des inputs mission
            document.getElementById('missionTitleInput').addEventListener('input', saveData);
            document.getElementById('rallyTimeInput').addEventListener('input', saveData);

            // Drag and Drop global listeners
            document.addEventListener('dragstart', handleDragStart);
            document.addEventListener('dragend', handleDragEnd);

            document.addEventListener('dragover', handleDragOver);
            document.addEventListener('drop', handleDrop);
            document.addEventListener('dragenter', handleDragEnter);
            document.addEventListener('dragleave', handleDragLeave);

            // Input trigramme listener (Modal Edition)
            document.getElementById('quick_edit_trigramme_input').addEventListener('input', (e) => {
                if (activeMemberId) {
                    const member = document.getElementById(activeMemberId);
                    member.dataset.trigramme = e.target.value.toUpperCase();
                    document.getElementById('selectedMemberTrigramme').textContent = e.target.value.toUpperCase();
                    updateMemberButtonVisuals(member);
                    saveData();
                }
            });

            // Listeners pour la configuration
            document.querySelectorAll('.collapsible-content textarea').forEach(textarea => {
                textarea.addEventListener('change', updateMemberConfigFromForm);
            });
        });

        // --- CORE FUNCTIONS ---

        function setupVehicleButtons() {
            const container = document.getElementById('vehicle_creation_buttons');
            availableVehicles.forEach(v => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'add-btn';
                btn.textContent = `➕ ${v}`;
                btn.onclick = () => { addPatracdvrRow(v); saveData(); };
                container.insertBefore(btn, document.getElementById('addManualVehicleBtn')); // Insert before manual btn
            });
        }

        function addManualVehicle() {
            const name = prompt("Nom du véhicule :");
            if (name) { addPatracdvrRow(name); saveData(); }
        }

        function addPatracdvrRow(vehicleName, members = []) {
            // Check doublon
            if (document.querySelector(`.patracdvr-vehicle-row[data-vehicle-name="${vehicleName}"]`)) {
                // Si le véhicule existe déjà, on ne fait rien (utile lors du restore)
                return;
            }

            const row = document.createElement('div');
            row.className = 'patracdvr-vehicle-row';
            row.dataset.vehicleName = vehicleName;
            row.innerHTML = `
                <div class="vehicle-header">
                    <span class="vehicle-name">${vehicleName}</span>
                    <button type="button" class="remove-btn" title="Supprimer Véhicule">❌</button>
                </div>
                <div class="patracdvr-members-container drop-zone"></div>
            `;

            // Delete handler
            row.querySelector('.remove-btn').onclick = () => {
                if (confirm(`Supprimer ${vehicleName} et désattribuer les membres ?`)) {
                    const membersContainer = row.querySelector('.patracdvr-members-container');
                    Array.from(membersContainer.children).forEach(btn => {
                        btn.dataset.cellule = 'Sans';
                        updateMemberButtonVisuals(btn);
                        unassignedContainer.appendChild(btn);
                    });
                    row.remove();
                    saveData();
                }
            };

            patracdvrContainer.appendChild(row);
            const membersContainer = row.querySelector('.patracdvr-members-container');
            if (members && members.length > 0) {
                members.forEach(m => addPatracdvrMember(membersContainer, m));
            }
        }

        function addPatracdvrMember(container, data = {}) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'patracdvr-member-btn draggable';
            btn.id = `mem_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
            btn.draggable = true;

            const defaults = {
                trigramme: 'N/A', fonction: 'Sans', cellule: 'Sans', principales: 'Sans', secondaires: 'PSA',
                afis: 'Sans', grenades: 'Sans', equipement: 'Sans', equipement2: 'Sans', tenue: 'UBAS', gpb: 'GPBL'
            };

            // Merge defaults and data
            // Note: on ignore les clés comme 'vehicle_assigned' pour l'affichage, elles ne servent qu'à la restoration
            const memberData = { ...defaults, ...data };

            // Stocker les données dans le dataset du bouton
            Object.keys(memberData).forEach(k => {
                if (k !== 'vehicle_assigned') {
                    btn.dataset[k] = memberData[k];
                }
            });

            updateMemberButtonVisuals(btn);
            btn.onclick = (e) => handleMemberSelection(e, btn);
            container.appendChild(btn);
            return btn;
        }

        function updateMemberButtonVisuals(btn) {
            const trig = btn.dataset.trigramme;
            const func = btn.dataset.fonction !== 'Sans' ? btn.dataset.fonction : '';
            const cell = btn.dataset.cellule !== 'Sans' ? btn.dataset.cellule : '';

            let subText = '';
            if (cell && func) subText = `${cell} / ${func}`;
            else if (cell) subText = cell;
            else if (func) subText = func;

            btn.innerHTML = `<span class="trigramme">${trig}</span>`;
            if (subText && !btn.closest('#unassigned_members_container')) {
                btn.innerHTML += `<span class="fonction">${subText}</span>`;
            }
        }

        // --- MODAL LOGIC ---

        function openNewMemberModal() {
            // Reset state
            tempNewMemberData = {
                trigramme: '', fonction: 'Sans', cellule: 'Sans', principales: 'Sans', secondaires: 'Sans',
                afis: 'Sans', grenades: 'Sans', equipement: 'Sans', equipement2: 'Sans', tenue: 'UBAS', gpb: 'GPBL'
            };
            document.getElementById('new_trigramme').value = '';
            document.getElementById('newMemberTrigrammeDisplay').textContent = 'Nouveau';

            renderNewMemberEditContent();

            // Reset Tab to Identity
            document.querySelector('#newMemberModal .tab-btn[data-tab="new_identity"]').click();

            newMemberModal.showModal();
        }

        function addNewMemberFromModal() {
            const trigramme = document.getElementById('new_trigramme').value.trim().toUpperCase();
            if (!trigramme) {
                alert("Le trigramme est obligatoire.");
                return;
            }

            tempNewMemberData.trigramme = trigramme;

            addPatracdvrMember(unassignedContainer, tempNewMemberData);
            saveData();
            newMemberModal.close();
        }


        // --- MEMBER EDIT MODAL (REPLACES QUICK EDIT PANEL) ---

        function setupTabs() {
            // Edit Modal
            const editBtns = document.querySelectorAll('#memberEditModal .tab-btn');
            const editContents = document.querySelectorAll('#memberEditModal .tab-content');
            setupTabGroup(editBtns, editContents);

            // New Modal
            const newBtns = document.querySelectorAll('#newMemberModal .tab-btn');
            const newContents = document.querySelectorAll('#newMemberModal .tab-content');
            setupTabGroup(newBtns, newContents);
        }

        function setupTabGroup(tabBtns, tabContents) {
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active from all
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));

                    // Add active to clicked
                    btn.classList.add('active');
                    document.getElementById(`tab_${btn.dataset.tab}`).classList.add('active');
                });
            });
        }

        function getWeaponSvgOrFallback(weaponName) {
            const normName = weaponName ? weaponName.toLowerCase().replace(/[\s\.-]/g, '') : 'sans';

            if (normName === 'sans' || normName === 'none' || normName === '') {
                return `<span class="material-symbols-outlined" style="color: #FF3B30; font-size: 32px;">do_not_disturb_on</span>`;
            }

            // On essaye de charger l'image. Si elle foire (onerror dans l'HTML), on mettra un fallback
            return `<img src="assets/${normName}.svg" alt="${weaponName}" onerror="this.onerror=null; this.outerHTML='<span style=\\'color:var(--accent-blue); font-weight:bold; font-size:12px;\\'>${weaponName.substring(0, 4)}</span>';">`;
        }

        function buildStepperHtml(label, confKey, attribute, currentValue, isNew = false) {
            const options = memberConfig[confKey] || ['Sans'];
            let currentIndex = options.indexOf(currentValue);
            if (currentIndex === -1) currentIndex = 0;

            const nextIndex = (currentIndex + 1) % options.length;
            const prevIndex = (currentIndex - 1 + options.length) % options.length;

            const func = isNew ? 'updateNewMemberAttribute' : 'updateMemberAttribute';

            return `
                <div class="stepper-container">
                    <span class="stepper-label">${label}</span>
                    <div class="stepper-controls">
                        <button type="button" class="stepper-btn" onclick="${func}('${attribute}', '${options[prevIndex]}')">
                            <span class="material-symbols-outlined">chevron_left</span>
                        </button>
                        <div class="stepper-value-container">
                            <span class="stepper-value">${options[currentIndex]}</span>
                        </div>
                        <button type="button" class="stepper-btn" onclick="${func}('${attribute}', '${options[nextIndex]}')">
                            <span class="material-symbols-outlined">chevron_right</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function buildWeaponSelectorHtml(label, confKey, attribute, currentValue, isNew = false) {
            const options = memberConfig[confKey] || ['Sans'];

            const func = isNew ? 'updateNewMemberAttribute' : 'updateMemberAttribute';

            let html = `
                <div class="weapon-category">
                    <span class="weapon-category-label">${label}</span>
                    <div class="weapon-scroll">
            `;

            options.forEach(opt => {
                const isSelected = (currentValue === opt);
                const selectedClass = isSelected ? 'selected' : '';
                html += `
                    <div class="weapon-item ${selectedClass}" onclick="${func}('${attribute}', '${opt}')">
                        <div class="weapon-icon-container">
                            ${getWeaponSvgOrFallback(opt)}
                        </div>
                        <span class="weapon-name">${opt}</span>
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        }

        function buildWeaponMultiSelectorHtml(label, confKey, attribute, currentValueStr, isNew = false) {
            const options = memberConfig[confKey] || ['Sans'];
            const currentValues = currentValueStr ? currentValueStr.split(',').map(s => s.trim()) : [];

            const func = isNew ? 'toggleNewMultiMemberAttribute' : 'toggleMultiMemberAttribute';

            let html = `
                <div class="weapon-category">
                    <span class="weapon-category-label">${label}</span>
                    <div class="weapon-scroll">
            `;

            options.forEach(opt => {
                const isSelected = currentValues.includes(opt);
                const selectedClass = isSelected ? 'selected' : '';
                html += `
                    <div class="weapon-item ${selectedClass}" onclick="${func}('${attribute}', '${opt}')">
                        <div class="weapon-icon-container">
                            ${getWeaponSvgOrFallback(opt)}
                        </div>
                        <span class="weapon-name">${opt}</span>
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        }

        function buildGearGridHtml(label, confKey, attribute, currentValueStr, isNew = false) {
            const options = memberConfig[confKey] || ['Sans'];
            const currentValues = currentValueStr ? currentValueStr.split(',').map(s => s.trim()) : [];

            const func = isNew ? 'toggleNewMultiMemberAttribute' : 'toggleMultiMemberAttribute';

            let html = `
                <div class="weapon-category">
                    <span class="weapon-category-label">${label}</span>
                    <div class="gear-grid">
            `;

            options.forEach(opt => {
                const isSelected = currentValues.includes(opt);
                const selectedClass = isSelected ? 'selected' : '';
                html += `
                    <button type="button" class="gear-btn ${selectedClass}" onclick="${func}('${attribute}', '${opt}')">
                        ${opt}
                    </button>
                `;
            });

            html += `</div></div>`;
            return html;
        }

        function renderMemberEditContent() {
            if (!activeMemberId) return;
            const member = document.getElementById(activeMemberId);
            const d = member.dataset;

            // --- TAB IDENTITY ---
            const tabId = document.getElementById('tab_identity');
            tabId.innerHTML =
                buildGearGridHtml('Fonction', 'fonctions', 'fonction', d.fonction || 'Sans') +
                buildGearGridHtml('Cellule', 'cellules', 'cellule', d.cellule || 'Sans') +
                buildStepperHtml('Tenue', 'tenues', 'tenue', d.tenue || 'UBAS') +
                buildGearGridHtml('GPB', 'gpbs', 'gpb', d.gpb || 'GPBL');

            // --- TAB WEAPONS ---
            const tabWeapons = document.getElementById('tab_weapons');
            tabWeapons.innerHTML =
                buildWeaponSelectorHtml('Arme Principale', 'principales', 'principales', d.principales || 'Sans') +
                buildWeaponSelectorHtml('Arme Secondaire', 'secondaires', 'secondaires', d.secondaires || 'Sans') +
                buildWeaponMultiSelectorHtml('A.F.I.', 'afis', 'afis', d.afis || 'Sans') +
                buildWeaponMultiSelectorHtml('Grenades', 'grenades', 'grenades', d.grenades || 'Sans');

            // --- TAB GEAR ---
            const tabGear = document.getElementById('tab_gear');
            tabGear.innerHTML =
                buildGearGridHtml('Équipement 1', 'equipements', 'equipement', d.equipement || 'Sans') +
                buildGearGridHtml('Équipement 2', 'equipements2', 'equipement2', d.equipement2 || 'Sans');
        }

        // Exposing to global scope for onclick handlers in generated HTML
        function renderNewMemberEditContent() {
            const d = tempNewMemberData;

            // --- TAB IDENTITY ---
            const tabId = document.getElementById('tab_new_identity');
            tabId.innerHTML =
                buildGearGridHtml('Fonction', 'fonctions', 'fonction', d.fonction || 'Sans', true) +
                buildGearGridHtml('Cellule', 'cellules', 'cellule', d.cellule || 'Sans', true) +
                buildStepperHtml('Tenue', 'tenues', 'tenue', d.tenue || 'UBAS', true) +
                buildGearGridHtml('GPB', 'gpbs', 'gpb', d.gpb || 'GPBL', true);

            // --- TAB WEAPONS ---
            const tabWeapons = document.getElementById('tab_new_weapons');
            tabWeapons.innerHTML =
                buildWeaponSelectorHtml('Arme Principale', 'principales', 'principales', d.principales || 'Sans', true) +
                buildWeaponSelectorHtml('Arme Secondaire', 'secondaires', 'secondaires', d.secondaires || 'Sans', true) +
                buildWeaponMultiSelectorHtml('A.F.I.', 'afis', 'afis', d.afis || 'Sans', true) +

        // --- DRAG AND DROP ---

        function handleDragStart(e) {
            if (e.target.classList.contains('draggable')) {
                draggedItem = e.target;
                e.target.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            }
        }

        function handleDragEnd(e) {
            if (draggedItem) {
                draggedItem.classList.remove('dragging');
                draggedItem = null;
            }
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            document.getElementById('trashCan').classList.remove('drag-over');
            document.querySelectorAll('#patracdvr_container, #unassigned_members_container, .patracdvr-members-container').forEach(el => el.style.borderStyle = 'dashed');
        }

        function handleDragEnter(e) {
            e.preventDefault();
            const target = e.target.closest('#trashCan, .patracdvr-members-container, #unassigned_members_container');
            if (target && draggedItem) {
                if (target.id === 'trashCan') {
                    target.classList.add('drag-over');
                } else {
                    target.style.borderStyle = 'solid';
                    target.style.borderColor = 'var(--accent-blue)';
                }
            }
        }

        function handleDragOver(e) {
            e.preventDefault();
            const target = e.target.closest('#trashCan, .patracdvr-members-container, #unassigned_members_container');
            if (!target) return;

            if (target.id === 'trashCan') {
                target.classList.add('drag-over');
            } else {
                target.style.borderStyle = 'solid';
                target.style.borderColor = 'var(--accent-blue)';

                const afterElement = getDragAfterElement(target, e.clientY);
                if (draggedItem) {
                    if (afterElement == null) {
                        target.appendChild(draggedItem);
                    } else {
                        target.insertBefore(draggedItem, afterElement);
                    }
                }
            }
        }

        function handleDragLeave(e) {
            const target = e.target.closest('#trashCan, .patracdvr-members-container, #unassigned_members_container');
            if (target) {
                if (e.relatedTarget && target.contains(e.relatedTarget)) { return; }
                target.classList.remove('drag-over');
                target.style.borderStyle = 'dashed';
                target.style.borderColor = 'var(--border-glass)';
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const trash = e.target.closest('#trashCan');

            if (trash && draggedItem) {
                // SUPPRESSION DIRECTE SANS CONFIRMATION
                draggedItem.remove();
                saveData();
                return;
            }

            const targetContainer = e.target.closest('.patracdvr-members-container, #unassigned_members_container');
            if (targetContainer && draggedItem) {
                if (targetContainer.id === 'unassigned_members_container') {
                    draggedItem.dataset.cellule = 'Sans';
                    draggedItem.dataset.fonction = 'Sans';
                } else {
                    if (draggedItem.dataset.cellule === 'Sans') draggedItem.dataset.cellule = 'India 1';
                }
                updateMemberButtonVisuals(draggedItem);
                saveData();
            }
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.draggable:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

                principales: d.principales, secondaires: d.secondaires, afis: d.afis,

        /**
         * SAVE DATA - Modifié pour respecter le canevas members_config.json
         * Structure: { options: {...}, members: [ {..., vehicle_assigned: "vName" } ], mission_info: {...} }
         */
        function saveData() {
            const allMembers = [];

            // 1. Récupérer les non-assignés
            unassignedContainer.querySelectorAll('.patracdvr-member-btn').forEach(btn => {
                const m = getMemberData(btn);
                m.vehicle_assigned = null; // Marqueur interne
                allMembers.push(m);
            });

            // 2. Récupérer les assignés (dans les véhicules)
            document.querySelectorAll('.patracdvr-vehicle-row').forEach(row => {
                const vName = row.dataset.vehicleName;
                row.querySelectorAll('.patracdvr-member-btn').forEach(btn => {
                    const m = getMemberData(btn);
                    m.vehicle_assigned = vName; // Marqueur interne
                    allMembers.push(m);
                });
            });

            const data = {
                options: memberConfig,
                members: allMembers,
                mission_info: {
                    title: document.getElementById('missionTitleInput').value,
                    rally: document.getElementById('rallyTimeInput').value
                }
            };

            localStorage.setItem('patracdvr_standalone_data', JSON.stringify(data));
            return data;
        }
        function syncWithOI() {
            try {
                const data = saveData(); // Get current state

                // Reformat for oiFormData
                let oiFormDataStr = localStorage.getItem('oiFormData');
                let oiFormData = oiFormDataStr ? JSON.parse(oiFormDataStr) : {};

                // Build patracdvr_rows
                const vehicles = [...new Set(data.members.filter(m => m.vehicle_assigned).map(m => m.vehicle_assigned))];
                oiFormData.patracdvr_rows = vehicles.map(vName => {
                    return {
                        vehicle: vName,
                        members: data.members.filter(m => m.vehicle_assigned === vName)
                    };
                });

                // Build patracdvr_unassigned
                oiFormData.patracdvr_unassigned = data.members.filter(m => !m.vehicle_assigned);

                // Sync config options
                oiFormData.memberConfig = data.options;

                // Save to oiFormData and trigger event for oi.html
                localStorage.setItem('oiFormData', JSON.stringify(oiFormData));
                localStorage.setItem('patracdvr_sync_timestamp', Date.now().toString());

                // Visual feedback
                const btn = document.getElementById('syncWithOiBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Synchronisé`;
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            } catch (err) {
                console.error("Erreur de synchronisation:", err);
                alert("Erreur lors de l'envoi vers OI : " + err.message);
            }
        }

        function loadData() {
            // Check if we are specifically clearing local data
            if (sessionStorage.getItem('ignore_oi_on_load') === 'true') {
                sessionStorage.removeItem('ignore_oi_on_load');
                populateConfigForm();
                return;
            }

            // First check if coming from OI with recent data
            const oiJson = localStorage.getItem('oiFormData');

            if (oiJson) {
                try {
                    const oiData = JSON.parse(oiJson);
                    // Map oiFormData back to patracdvr_standalone format

                    const mappedData = {
                        options: oiData.memberConfig || JSON.parse(JSON.stringify(DEFAULT_MEMBER_CONFIG)),
                        mission_info: {
                            title: document.getElementById('missionTitleInput')?.value || '', // OI doesn't sync these back yet
                            rally: document.getElementById('rallyTimeInput')?.value || ''
                        },
                        members: []
                    };

                    // Add unassigned
                    if (oiData.unassigned_members) {
                        oiData.unassigned_members.forEach(m => {
                            const newM = { ...m };
                            if (newM.id) delete newM.id;
                            mappedData.members.push(newM);
                        });
                    }

                    // Add rows
                    if (oiData.patracdvr_rows) {
                        oiData.patracdvr_rows.forEach(row => {
                            if (row.members) {
                                row.members.forEach(m => {
                                    const newM = { ...m, vehicle_assigned: row.vehicle };
                                    if (newM.id) delete newM.id;
                                    mappedData.members.push(newM);
                                });
                            }
                        });
                    }

                    restoreDataFromObject(mappedData);
                    return; // Successfully loaded from OI
                } catch (e) {
                    console.error("Error loading from oiFormData", e);
                }
            }

            // Fallback to standalone save
            const json = localStorage.getItem('patracdvr_standalone_data');
            if (!json) {
                populateConfigForm();
                return;
            }
            try {
                const data = JSON.parse(json);
                restoreDataFromObject(data);
            } catch (e) { console.error("Load error", e); }
        }

        /**
         * RESTORE DATA - Modifié pour lire le format plat avec vehicle_assigned
         */
        function restoreDataFromObject(data) {
            // Nettoyage
            patracdvrContainer.innerHTML = '';
            unassignedContainer.innerHTML = '';

            // Réinitialiser la configuration aux valeurs par défaut avant de fusionner
            memberConfig = JSON.parse(JSON.stringify(DEFAULT_MEMBER_CONFIG));

            // 1. Restauration Configuration Options (si présente)
            if (data.options) {
                // Fusion intelligente : Constantes par défaut + Valeurs importées uniques
                Object.keys(DEFAULT_MEMBER_CONFIG).forEach(key => {
                    const defaultValues = DEFAULT_MEMBER_CONFIG[key];
                    const importedValues = data.options[key] || [];

                    if (Array.isArray(defaultValues)) {
                        // Merge arrays et suppression des doublons
                        const combined = [...defaultValues, ...importedValues];
                        memberConfig[key] = [...new Set(combined)];
                    } else {
                        memberConfig[key] = importedValues;
                    }
                });

                // Ajouter les clés qui existent dans l'import mais pas dans les défauts
                Object.keys(data.options).forEach(key => {
                    if (!DEFAULT_MEMBER_CONFIG.hasOwnProperty(key)) {
                        memberConfig[key] = data.options[key];
                    }
                });
            }

            // 2. Restauration Mission Info
            // Supporte l'ancien format (root) et le nouveau format (mission_info)
            const mTitle = data.mission_info ? data.mission_info.title : (data.missionTitle || '');
            const mRally = data.mission_info ? data.mission_info.rally : (data.rallyTime || '');
            document.getElementById('missionTitleInput').value = mTitle;
            document.getElementById('rallyTimeInput').value = mRally;

            // 3. Restauration Membres & Véhicules
            // Cas A : Nouveau format (members list with vehicle_assigned)
            if (data.members && Array.isArray(data.members)) {

                // Identifier les véhicules à créer
                const vehiclesToCreate = [...new Set(data.members
                    .filter(m => m.vehicle_assigned)
                    .map(m => m.vehicle_assigned))];

                // Créer les lignes de véhicules
                vehiclesToCreate.forEach(vName => addPatracdvrRow(vName));

                // Distribuer les membres
                data.members.forEach(m => {
                    if (m.vehicle_assigned) {
                        const row = document.querySelector(`.patracdvr-vehicle-row[data-vehicle-name="${m.vehicle_assigned}"]`);
                        if (row) {
                            addPatracdvrMember(row.querySelector('.patracdvr-members-container'), m);
                        } else {
                            addPatracdvrMember(unassignedContainer, m); // Fallback
                        }
                    } else {
                        addPatracdvrMember(unassignedContainer, m);
                    }
                });
            }
            // Cas B : Ancien format de sauvegarde (rows array + unassigned array) - Rétrocompatibilité
            else if (data.rows || data.unassigned) {
                if (data.rows) data.rows.forEach(r => addPatracdvrRow(r.vehicle, r.members));
                if (data.unassigned) data.unassigned.forEach(m => addPatracdvrMember(unassignedContainer, m));
            }

            // Mise à jour de l'interface du Formulaire de config
            populateConfigForm();
        }

        function exportData() {
            const data = saveData();

            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // Format demandé : PATRACDVR-DATE

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);

                    if (confirm("Importer ce fichier va écraser la session actuelle. Continuer ?")) {
                        restoreDataFromObject(data);
                        saveData(); // Persist le nouvel état
                        alert("Importation réussie !");
                    }
                } catch (err) {
                    alert("Erreur lors de l'importation : " + err.message);
                }
                // Reset input pour permettre de réimporter le même fichier
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // Chargement de la config depuis un fichier racine
        async function loadDefaultConfig() {
            if (!confirm("Charger la configuration depuis members_config.json ? (Ceci écrasera les données actuelles)")) return;

            try {
                const response = await fetch('members_config.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const config = await response.json();

                // On utilise la fonction restore unifiée.
                // Le fichier members_config.json n'a pas de propriété 'vehicle_assigned', 
                // donc tous les membres iront dans "Non attribué", ce qui est le comportement attendu pour un chargement de roster.
                restoreDataFromObject(config);

                saveData();
                alert("Configuration chargée avec succès.");

            } catch (e) {
                console.error("Erreur chargement config:", e);
                alert("Impossible de charger members_config.json. Vérifiez qu'il est à la racine. Erreur: " + e.message);
            }
        }

        // --- PDF GENERATION ---

        async function generatePatracdvrPdf() {
            const { PDFDocument, StandardFonts, rgb, PageSizes } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            const helveticaFont = await pdfDoc.embedFont(StandardFonts.Helvetica);
            const helveticaBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

            // Helpers PDF
            let page = pdfDoc.addPage([PageSizes.A4[1], PageSizes.A4[0]]); // Landscape
            let { width, height } = page.getSize();
            let y = height - 40;
            const margin = 40;

            const drawText = (text, size, font, x, y, color = rgb(0, 0, 0)) => {
                page.drawText(String(text), { x, y, size, font, color });
            };

            const addNewPageIfNeeded = (neededHeight) => {
                if (y - neededHeight < margin) {
                    page = pdfDoc.addPage([PageSizes.A4[1], PageSizes.A4[0]]);
                    y = height - 40;
                    return true;
                }
                return false;
            };

            // Fonction pour découper le texte sur plusieurs lignes (Word Wrapping)
            const wrapText = (text, font, size, maxWidth) => {
                const words = String(text || '').replace(/\n/g, ' \n ').split(' ');
                let lines = [];
                let currentLine = '';
                for (const word of words) {
                    if (word === '\n') {
                        lines.push(currentLine);
                        currentLine = '';
                        continue;
                    }
                    const lineWithWord = currentLine === '' ? word : `${currentLine} ${word}`;
                    const width = font.widthOfTextAtSize(lineWithWord, size);
                    if (width > maxWidth && currentLine !== '') {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = lineWithWord;
                    }
                }
                lines.push(currentLine);
                return lines;
            };

            // Title Logic
            const missionTitle = document.getElementById('missionTitleInput').value.trim();
            const mainTitle = missionTitle ? `PATRACDVR - Mission : ${missionTitle}` : "FICHE PATRACDVR";

            drawText(mainTitle, 24, helveticaBold, margin, y, rgb(0, 51 / 255, 160 / 255));
            y -= 40;

            // Headers
            const headers = ["PAX", "Fct", "Cel.", "Arme P.", "Arme S.", "AFI", "Gren.", "Equip 1", "Equip 2", "Tenue", "GPB"];
            const colWidths = [50, 70, 60, 70, 50, 60, 60, 80, 80, 60, 60];
            const startX = margin;

            // Collect Data
            const rowsData = [];
            document.querySelectorAll('.patracdvr-vehicle-row').forEach(row => {
                const vName = row.dataset.vehicleName;
                rowsData.push({ type: 'header', text: `VÉHICULE : ${vName}` });

                row.querySelectorAll('.patracdvr-member-btn').forEach(btn => {
                    const d = btn.dataset;
                    rowsData.push({
                        type: 'data',
                        cells: [d.trigramme, d.fonction, d.cellule, d.principales, d.secondaires, d.afis, d.grenades, d.equipement, d.equipement2, d.tenue, d.gpb]
                    });
                });
                // Spacer
                rowsData.push({ type: 'spacer' });
            });

            // Draw Table
            const contentFontSize = 10;
            const cellPadding = 4;

            // Draw Column Headers initial
            const drawColumnHeaders = () => {
                let currentX = startX;
                headers.forEach((h, i) => {
                    page.drawRectangle({ x: currentX, y: y - 20, width: colWidths[i], height: 20, color: rgb(0.9, 0.9, 0.9), borderColor: rgb(0, 0, 0), borderWidth: 1 });
                    drawText(h, 9, helveticaBold, currentX + 2, y - 14);
                    currentX += colWidths[i];
                });
                y -= 20;
            };

            drawColumnHeaders();

            for (const row of rowsData) {
                if (row.type === 'header') {
                    // Vehicle Header Row
                    if (addNewPageIfNeeded(45)) { // 25 for header + 20 for cols
                        drawColumnHeaders();
                    }
                    page.drawRectangle({ x: startX, y: y - 20, width: width - 2 * margin, height: 20, color: rgb(0.85, 0.93, 1) });
                    drawText(row.text, 12, helveticaBold, startX + 5, y - 15, rgb(0, 0.2, 0.6));
                    y -= 25;
                } else if (row.type === 'data') {
                    // Data Row avec hauteur dynamique
                    // 1. Calculer les lignes pour chaque cellule
                    const cellLines = row.cells.map((cellText, i) => {
                        let text = (cellText === 'Sans' || !cellText) ? '-' : cellText;
                        return wrapText(text, helveticaFont, contentFontSize, colWidths[i] - (cellPadding * 2));
                    });

                    // 2. Déterminer la hauteur maximale de la ligne
                    const maxLines = Math.max(...cellLines.map(l => l.length), 1);
                    const lineHeight = contentFontSize + 2;
                    const rowHeight = (maxLines * lineHeight) + (cellPadding * 2);

                    if (addNewPageIfNeeded(rowHeight)) {
                        drawColumnHeaders();
                    }

                    // 3. Dessiner la ligne
                    let currentX = startX;
                    row.cells.forEach((_, i) => {
                        // Rectangle de fond de cellule
                        page.drawRectangle({ x: currentX, y: y - rowHeight, width: colWidths[i], height: rowHeight, borderColor: rgb(0.8, 0.8, 0.8), borderWidth: 0.5 });

                        // Texte ligne par ligne
                        const lines = cellLines[i];
                        lines.forEach((line, lineIdx) => {
                            page.drawText(line, {
                                x: currentX + cellPadding,
                                y: y - cellPadding - (lineIdx * lineHeight) - contentFontSize + 3,
                                size: contentFontSize,
                                font: helveticaFont,
                                color: rgb(0, 0, 0)
                            });
                        });

                        currentX += colWidths[i];
                    });
                    y -= rowHeight;

                } else if (row.type === 'spacer') {
                    y -= 10;
                }
            }

            // --- RALLY TIME FOOTER ---
            const rallyTime = document.getElementById('rallyTimeInput').value.trim();
            if (rallyTime) {
                const footerText = `Heure de rassemblement : ${rallyTime}`;
                // Ensure space
                if (y < margin + 30) {
                    page = pdfDoc.addPage([PageSizes.A4[1], PageSizes.A4[0]]);
                    y = height - 40;
                } else {
                    y -= 20; // Space from table
                }

                page.drawText(footerText, {
                    x: margin,
                    y: y,
                    size: 14,
                    font: helveticaBold,
                    color: rgb(0, 0, 0)
                });
            }

            // Save
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const safeTitle = missionTitle ? missionTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'patracdvr';
            link.download = `PATRACDVR_${safeTitle}_${new Date().toISOString().slice(0, 10)}.pdf`;
            link.click();
        }

    </script>
</body>
